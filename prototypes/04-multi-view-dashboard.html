<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Audit Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
.dash{max-width:1400px;margin:0 auto;padding:20px}
h1{font-size:1.4rem;font-weight:600;margin-bottom:16px;color:#f1f5f9}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.card{background:#1e2130;border:1px solid #2d3148;border-radius:10px;padding:14px 16px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--a,#6366f1)}
.card .l{font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:3px}
.card .v{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.card .s{font-size:.72rem;color:#64748b;margin-top:2px}
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;border:1px solid #2d3148;background:#1a1d2e;color:#94a3b8;cursor:pointer;font-size:.8rem;transition:all .15s;user-select:none}
.tab.active,.tab:hover{background:#2d3148;color:#f1f5f9;border-color:#4f46e5}
.view{display:none;background:#1a1d2e;border:1px solid #2d3148;border-radius:12px;overflow:hidden;min-height:500px;position:relative}
.view.active{display:block}
.tm-container{width:100%;height:500px;position:relative;overflow:hidden}
.tm-cell{position:absolute;overflow:hidden;cursor:pointer;transition:opacity .15s;display:flex;align-items:flex-end;padding:4px 6px;border:1px solid rgba(15,17,23,.5)}
.tm-cell:hover{opacity:.85;z-index:5}
.tm-cell span{font-size:.6rem;color:rgba(255,255,255,.85);text-shadow:0 1px 2px rgba(0,0,0,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.tm-cell .cv{position:absolute;top:3px;right:5px;font-size:.55rem;opacity:.6;color:#fff}
canvas{width:100%;height:500px;display:block}
.tree-container{width:100%;height:500px;overflow:auto;position:relative}
.tree-container svg{display:block}
.three-container{width:100%;height:500px;position:relative}
.tip{display:none;position:fixed;background:#1e2130;border:1px solid #3d4160;border-radius:8px;padding:8px 12px;font-size:.78rem;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.5);pointer-events:none;max-width:280px}
.tip.show{display:block}
.tip b{color:#f1f5f9;display:block}
.tip i{color:#94a3b8;font-style:normal;font-size:.72rem}
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.legend em{display:flex;align-items:center;gap:5px;font-size:.72rem;color:#94a3b8;font-style:normal}
.legend em::before{content:'';width:9px;height:9px;border-radius:2px;background:var(--c)}
.legend-graph{margin-top:8px}
.legend-graph em::before{border-radius:50%}
#loading3d{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:.9rem}
</style>
</head>
<body>
<div class="dash">
  <h1 id="title">Site Structure</h1>
  <div class="cards" id="cards"></div>
  <div class="tabs" id="tabbar"></div>
  <div class="view active" id="v-treemap"><div class="tm-container" id="tm"></div></div>
  <div class="view" id="v-force"><canvas id="cv"></canvas></div>
  <div class="view" id="v-tree"><div class="tree-container" id="tree-ct"></div></div>
  <div class="view" id="v-3d"><div class="three-container" id="three-ct"><div id="loading3d">Loading 3D view...</div></div></div>
  <div class="legend" id="legend"></div>
  <div class="legend legend-graph" id="legend-graph" style="display:none"></div>
</div>
<div class="tip" id="tip"><b></b><i></i></div>
<script>
// ===== DATA — Replace these two objects in your workflow =====
var TREE = {
  name:"example.com", total_pages:1586, health_score:98,
  children:[
    {name:"en",children:[{name:"/",value:42},{name:"/pricing",value:18},{name:"/blog",value:156},{name:"/docs",value:230},{name:"/api",value:87},{name:"/about",value:12},{name:"/contact",value:5},{name:"/careers",value:34},{name:"/changelog",value:67},{name:"/security",value:8}]},
    {name:"fr",children:[{name:"/",value:38},{name:"/tarifs",value:15},{name:"/blog",value:120},{name:"/docs",value:180},{name:"/api",value:72},{name:"/a-propos",value:10},{name:"/contact",value:5},{name:"/carrieres",value:28}]},
    {name:"de",children:[{name:"/",value:30},{name:"/preise",value:12},{name:"/blog",value:95},{name:"/docs",value:140},{name:"/api",value:60},{name:"/kontakt",value:4}]},
    {name:"ja",children:[{name:"/",value:25},{name:"/blog",value:45},{name:"/docs",value:88},{name:"/api",value:40}]},
    {name:"es",children:[{name:"/",value:20},{name:"/blog",value:38},{name:"/docs",value:65}]},
    {name:"pt",children:[{name:"/",value:15},{name:"/blog",value:22},{name:"/docs",value:40}]}
  ]
};
var GRAPH = {
  nodes:[
    {id:"/",g:"root"},{id:"/pricing",g:"mkt"},{id:"/blog",g:"cnt"},
    {id:"/blog/ai-trends",g:"cnt"},{id:"/blog/seo-guide",g:"cnt"},
    {id:"/docs",g:"doc"},{id:"/docs/getting-started",g:"doc"},
    {id:"/docs/api-reference",g:"doc"},{id:"/docs/webhooks",g:"doc"},
    {id:"/about",g:"mkt"},{id:"/contact",g:"mkt"},{id:"/careers",g:"co"},
    {id:"/changelog",g:"prod"},{id:"/security",g:"co"},
    {id:"/api",g:"doc"},{id:"/login",g:"auth"},{id:"/signup",g:"auth"}
  ],
  links:[
    ["/","/pricing"],["/","/blog"],["/","/docs"],["/","/about"],["/","/login"],["/","/signup"],
    ["/blog","/blog/ai-trends"],["/blog","/blog/seo-guide"],
    ["/blog/ai-trends","/docs"],["/blog/seo-guide","/pricing"],
    ["/docs","/docs/getting-started"],["/docs","/docs/api-reference"],["/docs","/docs/webhooks"],
    ["/docs/getting-started","/docs/api-reference"],
    ["/about","/contact"],["/about","/careers"],
    ["/pricing","/signup"],["/changelog","/docs"],["/api","/docs/api-reference"],
    ["/login","/signup"],["/careers","/about"],["/security","/docs"]
  ]
};
// ===== END DATA =====

var P=['#6366f1','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6'];
var GC={root:'#f59e0b',mkt:'#6366f1',cnt:'#10b981',doc:'#06b6d4',co:'#8b5cf6',prod:'#ec4899',auth:'#ef4444'};
var GL={root:'Root',mkt:'Marketing',cnt:'Content',doc:'Docs',co:'Company',prod:'Product',auth:'Auth'};
var tip=document.getElementById('tip'), tipB=tip.children[0], tipI=tip.children[1];

function showTip(x,y,t,s){tipB.textContent=t;tipI.textContent=s;tip.classList.add('show');
  var tx=Math.min(x+12,window.innerWidth-290),ty=Math.max(y-36,8);
  tip.style.left=tx+'px';tip.style.top=ty+'px'}
function hideTip(){tip.classList.remove('show')}

// === TABS (dynamic) ===
var VIEWS=[
  {id:'treemap',label:'Treemap'},
  {id:'force',label:'Force Graph'},
  {id:'tree',label:'Tree Layout'},
  {id:'3d',label:'3D Graph'}
];
var currentView='treemap';
(function(){
  var bar=document.getElementById('tabbar');
  VIEWS.forEach(function(v){
    var t=document.createElement('div');t.className='tab'+(v.id===currentView?' active':'');
    t.textContent=v.label;t.dataset.view=v.id;
    t.onclick=function(){showView(v.id)};
    bar.appendChild(t);
  });
})();
function showView(name){
  currentView=name;
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active')});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');if(t.dataset.view===name)t.classList.add('active')});
  document.getElementById('v-'+name).classList.add('active');
  // Legend switching
  var lg=document.getElementById('legend'),lgg=document.getElementById('legend-graph');
  if(name==='force'||name==='3d'){lg.style.display='none';lgg.style.display='flex'}
  else{lg.style.display='flex';lgg.style.display='none'}
  // Lazy-load 3D
  if(name==='3d'&&!window._3dLoaded){window._3dLoaded=true;init3D()}
  // Resize force canvas
  if(name==='force'&&window._forceResize)window._forceResize();
}

// === CARDS (6 KPIs) ===
(function(){
  var d=TREE, el=document.getElementById('cards');
  var tp=d.total_pages||0, lc=d.children.length, h=d.health_score||100;
  var totalSections=0;d.children.forEach(function(l){totalSections+=l.children.length});
  var graphNodes=GRAPH.nodes.length, graphLinks=GRAPH.links.length;
  var items=[
    {l:'Total Pages',v:tp.toLocaleString(),a:'#6366f1'},
    {l:'Locales',v:lc,a:'#06b6d4'},
    {l:'Sections',v:totalSections,a:'#10b981'},
    {l:'Health',v:h+'%',s:h>=95?'Excellent':h>=80?'Good':'Needs work',a:h>=95?'#10b981':'#f59e0b'},
    {l:'Nodes',v:graphNodes,s:graphLinks+' links',a:'#ec4899'},
    {l:'Domain',v:d.name,a:'#8b5cf6'}
  ];
  items.forEach(function(c){
    var card=document.createElement('div');card.className='card';card.style.setProperty('--a',c.a);
    var l=document.createElement('div');l.className='l';l.textContent=c.l;
    var v=document.createElement('div');v.className='v';v.textContent=c.v;
    card.appendChild(l);card.appendChild(v);
    if(c.s){var s=document.createElement('div');s.className='s';s.textContent=c.s;card.appendChild(s)}
    el.appendChild(card);
  });
  document.getElementById('title').textContent=d.name+' — Site Audit';
})();

// === TREEMAP (squarified, robust for single/multi-locale) ===
(function(){
  var container=document.getElementById('tm');
  var W=container.clientWidth||1200, H=container.clientHeight||500;
  var flat=[], total=0;
  var singleLocale=TREE.children.length===1;
  var sectionIdx=0;
  TREE.children.forEach(function(loc,i){
    loc.children.forEach(function(pg,j){
      // Normalize name: always show with "/" prefix
      var rawName=pg.name, displayName=rawName.startsWith('/')?rawName:'/'+rawName;
      // Color: by section when single-locale, by locale when multi-locale
      var color=singleLocale?P[sectionIdx%P.length]:P[i%P.length];
      // Tooltip path: hide "default" locale, show locale prefix for multi-locale
      var tipPath;
      if(singleLocale||loc.name==='default'){tipPath=displayName}
      else{tipPath='/'+loc.name+displayName}
      flat.push({name:displayName,value:pg.value,locale:loc.name,color:color,tipPath:tipPath});
      total+=pg.value;
      sectionIdx++;
    });
  });
  flat.sort(function(a,b){return b.value-a.value});
  // Compute max value for brightness scaling
  var maxVal=flat.length?flat[0].value:1;
  function squarify(items,x,y,w,h){
    if(!items.length)return;
    if(items.length===1){lay(items[0],x,y,w,h);return}
    var tot=items.reduce(function(s,i){return s+i.value},0);
    var horiz=w>=h,mainDim=horiz?h:w;
    var row=[items[0]],rowSum=items[0].value;
    var best=worst(row,rowSum,mainDim,tot);
    for(var i=1;i<items.length;i++){
      var nRow=row.concat(items[i]),nSum=rowSum+items[i].value;
      var nW=worst(nRow,nSum,mainDim,tot);
      if(nW<=best){row=nRow;rowSum=nSum;best=nW}else break;
    }
    var rf=rowSum/tot,rs=horiz?w*rf:h*rf,off=0;
    row.forEach(function(item){
      var f=item.value/rowSum,cs=mainDim*f;
      if(horiz)lay(item,x,y+off,rs,cs);else lay(item,x+off,y,cs,rs);
      off+=cs;
    });
    var rest=items.slice(row.length);
    if(horiz)squarify(rest,x+rs,y,w-rs,h);else squarify(rest,x,y+rs,w,h-rs);
  }
  function worst(row,rs,side,tot){
    var r2=rs*rs,mx=0,mn=Infinity;
    row.forEach(function(i){if(i.value>mx)mx=i.value;if(i.value<mn)mn=i.value});
    return Math.max(side*side*mx/r2,r2/(side*side*mn));
  }
  function lay(item,x,y,w,h){
    var el=document.createElement('div');el.className='tm-cell';
    el.style.left=x+'px';el.style.top=y+'px';el.style.width=Math.max(0,w-1)+'px';el.style.height=Math.max(0,h-1)+'px';
    // Brightness: log-scale relative to max, clamped 30-75%
    var ratio=Math.log(1+item.value)/Math.log(1+maxVal);
    var brightness=30+Math.round(ratio*45);
    el.style.background='color-mix(in srgb,'+item.color+' '+brightness+'%,#1e2130)';
    if(w>35&&h>20){var sp=document.createElement('span');sp.textContent=item.name;el.appendChild(sp)}
    if(w>50&&h>28){var cv=document.createElement('span');cv.className='cv';cv.textContent=item.value;el.appendChild(cv)}
    el.onmouseenter=el.onmousemove=function(e){showTip(e.clientX,e.clientY,item.tipPath,item.value+' pages ('+Math.round(item.value/total*100)+'%)')};
    el.onmouseleave=hideTip;
    container.appendChild(el);
  }
  squarify(flat,0,0,W,H);
})();

// === TREEMAP LEGEND (adapts: single-locale = section colors, multi-locale = locale colors) ===
(function(){
  var el=document.getElementById('legend');
  var singleLocale=TREE.children.length===1;
  if(singleLocale){
    // Show sections with individual colors
    var idx=0;
    TREE.children[0].children.forEach(function(sec){
      var em=document.createElement('em');
      em.style.setProperty('--c',P[idx%P.length]);
      var name=sec.name.startsWith('/')?sec.name:'/'+sec.name;
      em.appendChild(document.createTextNode(name+' ('+sec.value+')'));
      el.appendChild(em);
      idx++;
    });
  }else{
    TREE.children.forEach(function(loc,i){
      var em=document.createElement('em');
      em.style.setProperty('--c',P[i%P.length]);
      var count=loc.children.reduce(function(s,p){return s+p.value},0);
      em.appendChild(document.createTextNode(loc.name+' ('+count+')'));
      el.appendChild(em);
    });
  }
})();

// === GRAPH LEGEND ===
(function(){
  var el=document.getElementById('legend-graph');
  Object.keys(GC).forEach(function(k){
    var em=document.createElement('em');
    em.style.setProperty('--c',GC[k]);
    em.appendChild(document.createTextNode(GL[k]||k));
    el.appendChild(em);
  });
})();

// === FORCE GRAPH 2D (canvas, improved) ===
(function(){
  var cv=document.getElementById('cv'),ctx=cv.getContext('2d');
  var W,H,dpr;
  function resize(){
    dpr=window.devicePixelRatio||1;
    var rect=cv.parentElement.getBoundingClientRect();
    W=rect.width;H=500;
    cv.width=W*dpr;cv.height=H*dpr;
    cv.style.width=W+'px';cv.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();window.addEventListener('resize',resize);
  // Expose resize for tab switching (canvas starts hidden → width=0)
  var needsScatter=true;
  window._forceResize=function(){resize();if(needsScatter&&W>0){needsScatter=false;nodes.forEach(function(n){n.x=W/2+(Math.random()-.5)*300;n.y=H/2+(Math.random()-.5)*200})}};

  var nodes=GRAPH.nodes.map(function(n){return{id:n.id,g:n.g,x:W/2+(Math.random()-.5)*300,y:H/2+(Math.random()-.5)*200,vx:0,vy:0,lc:0}});
  var nm={};nodes.forEach(function(n){nm[n.id]=n});
  var links=GRAPH.links.map(function(l){return{s:nm[l[0]],t:nm[l[1]]}}).filter(function(l){return l.s&&l.t});
  links.forEach(function(l){l.s.lc++;l.t.lc++});

  // Adaptive physics based on graph size
  var N=nodes.length;
  var SL=N>50?90:70, SK=N>50?.008:.01, REP=N>50?4000:2500, DMP=.88, CK=.003;
  var camX=0,camY=0,camS=1,dragN=null,panOn=false,ps={x:0,y:0};
  var hoverN=null; // highlighted node

  function tw(sx,sy){return[(sx-W/2)/camS-camX,(sy-H/2)/camS-camY]}
  function sim(){
    for(var i=0;i<nodes.length;i++)for(var j=i+1;j<nodes.length;j++){
      var a=nodes[i],b=nodes[j],dx=b.x-a.x,dy=b.y-a.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      var f=REP/(d*d),fx=dx/d*f,fy=dy/d*f;
      a.vx-=fx;a.vy-=fy;b.vx+=fx;b.vy+=fy;
    }
    links.forEach(function(l){
      var dx=l.t.x-l.s.x,dy=l.t.y-l.s.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      var f=(d-SL)*SK;l.s.vx+=dx/d*f;l.s.vy+=dy/d*f;l.t.vx-=dx/d*f;l.t.vy-=dy/d*f;
    });
    nodes.forEach(function(n){
      if(n.drag)return;
      n.vx+=(W/2-n.x)*CK;n.vy+=(H/2-n.y)*CK;
      n.vx*=DMP;n.vy*=DMP;n.x+=n.vx;n.y+=n.vy;
    });
  }
  function draw(){
    ctx.clearRect(0,0,W,H);ctx.save();ctx.translate(W/2,H/2);ctx.scale(camS,camS);ctx.translate(camX,camY);
    // Edges
    links.forEach(function(l){
      var connected=hoverN&&(l.s===hoverN||l.t===hoverN);
      ctx.lineWidth=(connected?2.5:1)/camS;
      ctx.strokeStyle=connected?'rgba(99,102,241,.7)':'rgba(100,116,139,.15)';
      ctx.beginPath();ctx.moveTo(l.s.x,l.s.y);ctx.lineTo(l.t.x,l.t.y);ctx.stroke();
      // Arrow
      if(connected){
        var dx=l.t.x-l.s.x,dy=l.t.y-l.s.y,d=Math.sqrt(dx*dx+dy*dy)||1;
        var r=Math.max(4,Math.sqrt(l.t.lc)*3.5);
        var ax=l.t.x-dx/d*(r+4),ay=l.t.y-dy/d*(r+4);
        var sz=6/camS,ang=Math.atan2(dy,dx);
        ctx.fillStyle='rgba(99,102,241,.7)';ctx.beginPath();
        ctx.moveTo(ax+Math.cos(ang)*sz,ay+Math.sin(ang)*sz);
        ctx.lineTo(ax+Math.cos(ang+2.5)*sz*.6,ay+Math.sin(ang+2.5)*sz*.6);
        ctx.lineTo(ax+Math.cos(ang-2.5)*sz*.6,ay+Math.sin(ang-2.5)*sz*.6);
        ctx.fill();
      }
    });
    // Nodes
    nodes.forEach(function(n){
      var r=Math.max(4,Math.sqrt(n.lc)*3.5),c=GC[n.g]||'#6366f1';
      var isHover=n===hoverN;
      var isConn=hoverN&&links.some(function(l){return(l.s===hoverN&&l.t===n)||(l.t===hoverN&&l.s===n)});
      var dimmed=hoverN&&!isHover&&!isConn;
      ctx.globalAlpha=dimmed?.25:1;
      ctx.shadowColor=c;ctx.shadowBlur=isHover?20:8;ctx.fillStyle=c;
      ctx.beginPath();ctx.arc(n.x,n.y,isHover?r*1.3:r,0,6.28);ctx.fill();ctx.shadowBlur=0;
      // Ring on hover
      if(isHover){ctx.strokeStyle='#f1f5f9';ctx.lineWidth=2/camS;ctx.stroke()}
      // Label
      if(camS>.4||n.g==='root'||isHover||isConn){
        ctx.fillStyle=dimmed?'rgba(226,232,240,.25)':'#e2e8f0';
        ctx.font='bold '+(isHover?12:10)/camS+'px system-ui';ctx.textAlign='center';
        ctx.fillText(n.id,n.x,n.y-r-5/camS);
      }
      ctx.globalAlpha=1;
    });
    ctx.restore();
  }
  function tick(){sim();draw();requestAnimationFrame(tick)}

  cv.addEventListener('mousedown',function(e){
    var rect=cv.getBoundingClientRect(),p=tw(e.clientX-rect.left,e.clientY-rect.top);
    var best=null,bd=18/camS;
    nodes.forEach(function(n){var d=Math.sqrt((n.x-p[0])**2+(n.y-p[1])**2);if(d<bd){bd=d;best=n}});
    if(best){dragN=best;dragN.drag=true}else{panOn=true;ps={x:e.clientX,y:e.clientY}}
  });
  cv.addEventListener('mousemove',function(e){
    var rect=cv.getBoundingClientRect();
    if(dragN){var p=tw(e.clientX-rect.left,e.clientY-rect.top);dragN.x=p[0];dragN.y=p[1];dragN.vx=0;dragN.vy=0}
    else if(panOn){camX+=(e.clientX-ps.x)/camS;camY+=(e.clientY-ps.y)/camS;ps={x:e.clientX,y:e.clientY}}
    else{
      var p=tw(e.clientX-rect.left,e.clientY-rect.top);
      var best=null,bd=18/camS;
      nodes.forEach(function(n){var d=Math.sqrt((n.x-p[0])**2+(n.y-p[1])**2);if(d<bd){bd=d;best=n}});
      hoverN=best;
      if(best){
        var conns=links.filter(function(l){return l.s===best||l.t===best});
        showTip(e.clientX,e.clientY,best.id,best.lc+' connections | '+GL[best.g]);
      }else hideTip();
    }
  });
  cv.addEventListener('mouseup',function(){if(dragN)dragN.drag=false;dragN=null;panOn=false});
  cv.addEventListener('mouseleave',function(){if(dragN)dragN.drag=false;dragN=null;panOn=false;hoverN=null;hideTip()});
  cv.addEventListener('wheel',function(e){e.preventDefault();camS=Math.max(.15,Math.min(6,camS*(e.deltaY>0?.92:1.08)))},{passive:false});
  tick();
})();

// === TREE LAYOUT 2D (hierarchical, SVG) ===
(function(){
  var container=document.getElementById('tree-ct');
  // Build tree from GRAPH data: extract parent-child from URL paths
  function buildHierarchy(){
    var root={id:'/',label:'/',children:[],g:'root',depth:0};
    var map={'/':root};
    // Sort nodes by path depth so parents are created before children
    var sorted=GRAPH.nodes.slice().sort(function(a,b){return a.id.split('/').length-b.id.split('/').length});
    sorted.forEach(function(n){
      if(n.id==='/')return;
      var parts=n.id.split('/').filter(Boolean);
      var parentPath='/'+parts.slice(0,-1).join('/');
      if(parentPath!=='/') parentPath='/'+parts.slice(0,-1).join('/');
      if(!map[parentPath]) parentPath='/'; // fallback to root
      var node={id:n.id,label:parts[parts.length-1]||n.id,children:[],g:n.g,depth:parts.length};
      map[n.id]=node;
      map[parentPath].children.push(node);
    });
    return root;
  }

  var tree=buildHierarchy();
  var NW=160,NH=36,PX=200,PY=52; // node width, height, padding x/y

  // Assign y positions (Reingold-Tilford-like, simplified)
  var yCounter=0;
  function layoutTree(node,depth){
    node.x=depth*PX+40;
    if(!node.children.length){
      node.y=yCounter*PY+30;
      yCounter++;
    }else{
      node.children.forEach(function(c){layoutTree(c,depth+1)});
      var first=node.children[0].y,last=node.children[node.children.length-1].y;
      node.y=(first+last)/2;
    }
  }
  layoutTree(tree,0);

  var totalW=(maxDepth(tree)+1)*PX+NW+80;
  var totalH=yCounter*PY+40;

  function maxDepth(n){return n.children.length?1+Math.max.apply(null,n.children.map(maxDepth)):0}

  // Create SVG
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('width',totalW);svg.setAttribute('height',totalH);
  svg.setAttribute('viewBox','0 0 '+totalW+' '+totalH);

  // Draw edges first
  function drawEdges(node){
    node.children.forEach(function(c){
      var path=document.createElementNS('http://www.w3.org/2000/svg','path');
      var sx=node.x+NW,sy=node.y+NH/2,ex=c.x,ey=c.y+NH/2;
      var mx=(sx+ex)/2;
      path.setAttribute('d','M'+sx+','+sy+' C'+mx+','+sy+' '+mx+','+ey+' '+ex+','+ey);
      path.setAttribute('fill','none');
      path.setAttribute('stroke','rgba(100,116,139,.3)');
      path.setAttribute('stroke-width','1.5');
      svg.appendChild(path);
      drawEdges(c);
    });
  }
  drawEdges(tree);

  // Draw nodes
  function drawNodes(node){
    var g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform','translate('+node.x+','+node.y+')');
    // Background rect
    var rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('width',NW);rect.setAttribute('height',NH);
    rect.setAttribute('rx','6');rect.setAttribute('ry','6');
    rect.setAttribute('fill','#1e2130');rect.setAttribute('stroke',GC[node.g]||'#6366f1');
    rect.setAttribute('stroke-width','1.5');
    g.appendChild(rect);
    // Top accent line
    var accent=document.createElementNS('http://www.w3.org/2000/svg','rect');
    accent.setAttribute('width',NW);accent.setAttribute('height','3');
    accent.setAttribute('rx','6');accent.setAttribute('ry','6');
    accent.setAttribute('fill',GC[node.g]||'#6366f1');accent.setAttribute('opacity','.6');
    g.appendChild(accent);
    // Label
    var text=document.createElementNS('http://www.w3.org/2000/svg','text');
    text.setAttribute('x','10');text.setAttribute('y',NH/2+4);
    text.setAttribute('fill','#e2e8f0');text.setAttribute('font-size','11');
    text.setAttribute('font-family','system-ui,sans-serif');
    text.textContent=node.label.length>18?node.label.slice(0,16)+'..':node.label;
    g.appendChild(text);
    // Children count badge
    if(node.children.length){
      var badge=document.createElementNS('http://www.w3.org/2000/svg','text');
      badge.setAttribute('x',NW-8);badge.setAttribute('y',NH/2+4);
      badge.setAttribute('fill','#64748b');badge.setAttribute('font-size','9');
      badge.setAttribute('text-anchor','end');badge.setAttribute('font-family','system-ui');
      badge.textContent=node.children.length;
      g.appendChild(badge);
    }
    // Hover effect
    g.style.cursor='pointer';
    g.addEventListener('mouseenter',function(e){
      rect.setAttribute('stroke-width','2.5');
      showTip(e.clientX,e.clientY,node.id,node.children.length+' children | '+GL[node.g]);
    });
    g.addEventListener('mousemove',function(e){
      showTip(e.clientX,e.clientY,node.id,node.children.length+' children | '+GL[node.g]);
    });
    g.addEventListener('mouseleave',function(){rect.setAttribute('stroke-width','1.5');hideTip()});
    svg.appendChild(g);
    node.children.forEach(drawNodes);
  }
  drawNodes(tree);
  container.appendChild(svg);
})();

// === 3D FORCE GRAPH (Three.js, lazy-loaded) ===
function init3D(){
  var ct=document.getElementById('three-ct');
  var loading=document.getElementById('loading3d');

  // Load Three.js from CDN via ES module
  var script=document.createElement('script');
  script.type='importmap';
  script.textContent=JSON.stringify({imports:{
    "three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }});
  document.head.appendChild(script);

  var mod=document.createElement('script');
  mod.type='module';
  mod.textContent=`
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
import {CSS2DRenderer,CSS2DObject} from 'three/addons/renderers/CSS2DRenderer.js';

var ct=document.getElementById('three-ct');
var W=ct.clientWidth,H=ct.clientHeight||500;
document.getElementById('loading3d').style.display='none';

// Scene
var scene=new THREE.Scene();
scene.background=new THREE.Color(0x0f1117);
scene.fog=new THREE.FogExp2(0x0f1117,0.002);

// Camera
var camera=new THREE.PerspectiveCamera(60,W/H,1,2000);
camera.position.set(0,0,300);

// Renderer
var renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(W,H);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
ct.appendChild(renderer.domElement);

// CSS2D for labels
var labelRenderer=new CSS2DRenderer();
labelRenderer.setSize(W,H);
labelRenderer.domElement.style.position='absolute';
labelRenderer.domElement.style.top='0';
labelRenderer.domElement.style.pointerEvents='none';
ct.appendChild(labelRenderer.domElement);

// Controls
var controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.05;
controls.minDistance=50;controls.maxDistance=800;

// Colors
var GC3={root:0xf59e0b,mkt:0x6366f1,cnt:0x10b981,doc:0x06b6d4,co:0x8b5cf6,prod:0xec4899,auth:0xef4444};

// Build nodes
var nodes3d=GRAPH.nodes.map(function(n,i){
  var c=GC3[n.g]||0x6366f1;
  var geo=new THREE.SphereGeometry(3,16,16);
  var mat=new THREE.MeshPhongMaterial({color:c,emissive:c,emissiveIntensity:0.3,transparent:true,opacity:0.9});
  var mesh=new THREE.Mesh(geo,mat);
  // Initial position: spherical distribution
  var phi=Math.acos(-1+2*(i+0.5)/GRAPH.nodes.length);
  var theta=Math.sqrt(GRAPH.nodes.length*Math.PI)*phi;
  mesh.position.set(Math.cos(theta)*Math.sin(phi)*100,Math.sin(theta)*Math.sin(phi)*100,Math.cos(phi)*100);
  mesh.userData={id:n.id,g:n.g,vx:0,vy:0,vz:0};
  scene.add(mesh);
  // Label
  var div=document.createElement('div');
  div.textContent=n.id;div.style.cssText='color:#e2e8f0;font:10px system-ui;text-shadow:0 1px 3px #000;pointer-events:none';
  var label=new CSS2DObject(div);
  label.position.set(0,5,0);mesh.add(label);
  return mesh;
});

// Node map for link lookup
var nm3={};nodes3d.forEach(function(m){nm3[m.userData.id]=m});

// Build edges
var links3d=GRAPH.links.map(function(l){
  var s=nm3[l[0]],t=nm3[l[1]];
  if(!s||!t)return null;
  var geo=new THREE.BufferGeometry();
  var pts=new Float32Array(6);
  geo.setAttribute('position',new THREE.BufferAttribute(pts,3));
  var mat=new THREE.LineBasicMaterial({color:0x64748b,transparent:true,opacity:0.2});
  var line=new THREE.Line(geo,mat);
  line.userData={s:s,t:t};
  scene.add(line);
  return line;
}).filter(Boolean);

// Lighting
scene.add(new THREE.AmbientLight(0x404060,2));
var dl=new THREE.DirectionalLight(0xffffff,1);dl.position.set(100,200,100);scene.add(dl);
var pl=new THREE.PointLight(0x6366f1,1,500);pl.position.set(0,0,0);scene.add(pl);

// Physics
var SL3=40,SK3=0.008,REP3=3000,DMP3=0.9,CK3=0.002;
function sim3d(){
  for(var i=0;i<nodes3d.length;i++)for(var j=i+1;j<nodes3d.length;j++){
    var a=nodes3d[i],b=nodes3d[j];
    var dx=b.position.x-a.position.x,dy=b.position.y-a.position.y,dz=b.position.z-a.position.z;
    var d=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
    var f=REP3/(d*d);
    a.userData.vx-=dx/d*f;a.userData.vy-=dy/d*f;a.userData.vz-=dz/d*f;
    b.userData.vx+=dx/d*f;b.userData.vy+=dy/d*f;b.userData.vz+=dz/d*f;
  }
  links3d.forEach(function(l){
    var s=l.userData.s,t=l.userData.t;
    var dx=t.position.x-s.position.x,dy=t.position.y-s.position.y,dz=t.position.z-s.position.z;
    var d=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
    var f=(d-SL3)*SK3;
    s.userData.vx+=dx/d*f;s.userData.vy+=dy/d*f;s.userData.vz+=dz/d*f;
    t.userData.vx-=dx/d*f;t.userData.vy-=dy/d*f;t.userData.vz-=dz/d*f;
  });
  nodes3d.forEach(function(m){
    var u=m.userData;
    u.vx-=m.position.x*CK3;u.vy-=m.position.y*CK3;u.vz-=m.position.z*CK3;
    u.vx*=DMP3;u.vy*=DMP3;u.vz*=DMP3;
    m.position.x+=u.vx;m.position.y+=u.vy;m.position.z+=u.vz;
  });
  // Update edge geometry
  links3d.forEach(function(l){
    var s=l.userData.s.position,t=l.userData.t.position;
    var pos=l.geometry.attributes.position.array;
    pos[0]=s.x;pos[1]=s.y;pos[2]=s.z;pos[3]=t.x;pos[4]=t.y;pos[5]=t.z;
    l.geometry.attributes.position.needsUpdate=true;
  });
}

// Raycaster for hover
var raycaster=new THREE.Raycaster();
raycaster.params.Points={threshold:5};
var mouse=new THREE.Vector2();
var hoveredNode=null;

ct.addEventListener('mousemove',function(e){
  var rect=renderer.domElement.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/W)*2-1;
  mouse.y=-((e.clientY-rect.top)/H)*2+1;
  raycaster.setFromCamera(mouse,camera);
  var intersects=raycaster.intersectObjects(nodes3d);
  if(intersects.length>0){
    var obj=intersects[0].object;
    if(hoveredNode!==obj){
      if(hoveredNode)hoveredNode.material.emissiveIntensity=0.3;
      hoveredNode=obj;obj.material.emissiveIntensity=0.8;
      obj.scale.set(1.5,1.5,1.5);
    }
    showTip(e.clientX,e.clientY,obj.userData.id,obj.userData.g);
  }else{
    if(hoveredNode){hoveredNode.material.emissiveIntensity=0.3;hoveredNode.scale.set(1,1,1);hoveredNode=null}
    hideTip();
  }
});

// Animation
function animate(){
  requestAnimationFrame(animate);
  sim3d();controls.update();
  renderer.render(scene,camera);
  labelRenderer.render(scene,camera);
}
animate();

// Resize
window.addEventListener('resize',function(){
  W=ct.clientWidth;H=ct.clientHeight||500;
  camera.aspect=W/H;camera.updateProjectionMatrix();
  renderer.setSize(W,H);labelRenderer.setSize(W,H);
});
`;
  document.body.appendChild(mod);
}
</script>
