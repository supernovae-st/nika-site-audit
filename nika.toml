[project]
name = "nika-site-audit"
description = "Full site audit workflow — crawl, enrich, analyze, report"

[provider]
default = "openai"
model = "gpt-5.2"

[tools]
allow_exec = true
allow_network = true

[policy]
allow_exec = true
allow_network = true
fetch_allow = [
  "api.elevenlabs.io",
  "generativelanguage.googleapis.com",
]
fetch_robots_bypass = [
  "api.elevenlabs.io",
  "generativelanguage.googleapis.com",
]

[artifacts]
dir = "./artifacts"
