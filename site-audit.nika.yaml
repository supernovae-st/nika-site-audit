schema: nika/workflow@0.12
workflow: site-audit-v10
description: "Professional SEO + GEO site audit — crawl, enrich, analyze, chart, report"
provider: openai
model: gpt-5.2

artifacts:
  dir: ./artifacts
  max_size: 536870912

skills:
  seo: ./skills/seo-auditor.md

context:
  files:
    dashboard_template: ./templates/dashboard.html

inputs:
  url: "https://htmx.org"

tasks:

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 0: GEO discovery (parallel with sitemap)
  # ═════════════════════════════════════════════════════════════════════

  - id: fetch_robots
    description: "Fetch robots.txt for AI crawler analysis"
    fetch:
      url: "{{inputs.url}}/robots.txt"
      response: slim
      extract: text
      timeout: 10

  - id: fetch_llmstxt
    description: "Check for llms.txt (AI content discovery)"
    fetch:
      url: "{{inputs.url}}/llms.txt"
      response: slim
      extract: text
      timeout: 10

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 1: Seeds (parallel)
  # ═════════════════════════════════════════════════════════════════════

  - id: fetch_sitemap
    description: "Parse sitemap.xml — returns empty on 404 (spider mode)"
    fetch:
      url: "{{inputs.url}}/sitemap.xml"
      response: slim
      extract: sitemap
      timeout: 30
    retry:
      max_attempts: 2
      delay_ms: 2000
      backoff: 2.0

  - id: fetch_homepage
    description: "Extract all links from homepage"
    fetch:
      url: "{{inputs.url}}"
      extract: links
      timeout: 20
    retry:
      max_attempts: 3
      delay_ms: 2000

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 2: Expand sitemapindex
  # ═════════════════════════════════════════════════════════════════════

  - id: fetch_sub_sitemaps
    depends_on: [fetch_sitemap]
    for_each: "$fetch_sitemap.extracted.sitemaps"
    as: sm
    concurrency: 5
    fail_fast: false
    fetch:
      url: "{{with.sm.loc}}"
      extract: sitemap
      timeout: 30
    retry:
      max_attempts: 3
      delay_ms: 3000
      backoff: 2.0

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 3: Combine all seed URLs
  # ═════════════════════════════════════════════════════════════════════

  - id: main_urls
    depends_on: [fetch_sitemap]
    with: { data: $fetch_sitemap }
    invoke:
      tool: "nika:map"
      params:
        array: "{{with.data.extracted.urls}}"
        selector: "loc"

  - id: sub_urls
    depends_on: [fetch_sub_sitemaps]
    with: { data: $fetch_sub_sitemaps }
    invoke:
      tool: "nika:json_query"
      params:
        data: "{{with.data}}"
        query: "$..loc"

  - id: homepage_urls_raw
    depends_on: [fetch_homepage]
    with: { data: $fetch_homepage }
    invoke:
      tool: "nika:map"
      params:
        array: "{{with.data.links}}"
        selector: "url"

  # Filter homepage links to same-domain only (prevents crawling external sites)
  - id: homepage_link_objects
    depends_on: [fetch_homepage]
    with: { data: $fetch_homepage }
    invoke:
      tool: "nika:filter"
      params:
        array: "{{with.data.links}}"
        field: "url"
        op: "starts_with"
        value: "{{inputs.url}}"

  - id: homepage_urls
    depends_on: [homepage_link_objects]
    with: { links: $homepage_link_objects }
    invoke:
      tool: "nika:map"
      params:
        array: "{{with.links}}"
        selector: "url"

  - id: sitemap_urls
    depends_on: [main_urls, sub_urls]
    with: { main: $main_urls, subs: $sub_urls }
    invoke:
      tool: "nika:json_merge"
      params:
        items: ["{{with.main}}", "{{with.subs}}"]
        mode: "concat"

  - id: new_homepage_urls
    depends_on: [sitemap_urls, homepage_urls]
    with: { home: $homepage_urls, sitemap: $sitemap_urls }
    invoke:
      tool: "nika:set_diff"
      params:
        a: "{{with.home}}"
        b: "{{with.sitemap}}"

  - id: all_urls
    depends_on: [sitemap_urls, new_homepage_urls]
    with: { sitemap: $sitemap_urls, new: $new_homepage_urls }
    invoke:
      tool: "nika:json_merge"
      params:
        items: ["{{with.sitemap}}", "{{with.new}}"]
        mode: "concat"

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 4: Crawl — response:slim + extract:metadata
  # ~800 bytes/page, governor 10 RPS
  # ═════════════════════════════════════════════════════════════════════

  - id: crawl_pages
    description: "Crawl all pages — metadata per page"
    depends_on: [all_urls]
    for_each: "$all_urls"
    as: page_url
    concurrency: 10
    fail_fast: false
    fetch:
      url: "{{with.page_url}}"
      response: slim
      extract: metadata
      timeout: 15
    retry:
      max_attempts: 2
      delay_ms: 2000
      backoff: 2.0

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 5: Round 2 — Link discovery on sample pages
  # Fetch links from 20 sample pages → filter internal → set_diff → crawl new
  # ═════════════════════════════════════════════════════════════════════

  # 5a. Pick 20 sample URLs for link extraction
  - id: sample_urls
    depends_on: [all_urls]
    with: { urls: $all_urls }
    invoke:
      tool: "nika:json_query"
      params:
        data: "{{with.urls}}"
        query: "$[0:20]"

  # 5b. Fetch links from 20 sample pages
  - id: sample_links
    depends_on: [sample_urls]
    for_each: "$sample_urls"
    as: page_url
    concurrency: 5
    fail_fast: false
    fetch:
      url: "{{with.page_url}}"
      extract: links
      timeout: 15
    retry:
      max_attempts: 2
      delay_ms: 2000

  # 5c. Extract all link objects from sample results
  - id: all_link_objects
    depends_on: [sample_links]
    with: { results: $sample_links }
    invoke:
      tool: "nika:json_query"
      params:
        data: "{{with.results}}"
        query: "$..links[*]"

  # 5d. Filter to same-domain link objects
  - id: internal_link_objects
    depends_on: [all_link_objects]
    with: { links: $all_link_objects }
    invoke:
      tool: "nika:filter"
      params:
        array: "{{with.links}}"
        field: "url"
        op: "starts_with"
        value: "{{inputs.url}}"

  # 5e. Extract just the URLs
  - id: discovered_urls
    depends_on: [internal_link_objects]
    with: { links: $internal_link_objects }
    invoke:
      tool: "nika:map"
      params:
        array: "{{with.links}}"
        selector: "url"

  # 5f. Find truly new URLs (not in sitemap)
  - id: r2_new_urls
    depends_on: [discovered_urls, all_urls]
    with: { found: $discovered_urls, seeds: $all_urls }
    invoke:
      tool: "nika:set_diff"
      params:
        a: "{{with.found}}"
        b: "{{with.seeds}}"

  # 5f. Crawl new pages
  - id: crawl_r2
    description: "Round 2: crawl pages discovered from internal links"
    depends_on: [r2_new_urls]
    for_each: "$r2_new_urls"
    as: page_url
    concurrency: 5
    fail_fast: false
    fetch:
      url: "{{with.page_url}}"
      response: slim
      extract: metadata
      timeout: 15
    retry:
      max_attempts: 2
      delay_ms: 2000
      backoff: 2.0

  # 5g. Merge R1 + R2 results
  - id: all_results
    depends_on: [crawl_pages, crawl_r2]
    with: { r1: $crawl_pages, r2: $crawl_r2 }
    invoke:
      tool: "nika:json_merge"
      params:
        items: ["{{with.r1}}", "{{with.r2}}"]
        mode: "concat"

  # Remove null entries from failed crawl iterations
  - id: valid_results
    depends_on: [all_results]
    with: { results: $all_results }
    invoke:
      tool: "nika:filter"
      params:
        array: "{{with.results}}"
        field: "status"
        op: "gte"
        value: 0

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 6: Enrich each page (ZERO LLM — all native transforms)
  # ═════════════════════════════════════════════════════════════════════

  - id: enriched_pages
    depends_on: [valid_results]
    with: { results: $valid_results }
    invoke:
      tool: "nika:enrich"
      params:
        array: "{{with.results}}"
        fields:
          locale_raw: "url | url_path | split('/') | compact | first | default('default')"
          locale: "url | url_path | split('/') | compact | first | default('default') | regex('^[a-z]{2,3}(-[a-z]{2,4})?$') | default('default')"
          depth: "url | url_path | split('/') | compact | length"
          title: "extracted.title | default('')"
          description: "extracted.description | default('')"
          canonical: "extracted.canonical | default('')"
          hreflang_count: "extracted.hreflang | default([]) | length"
          is_soft_404: "extracted.title | default('') | lower | contains('not found')"
          section: "url | url_path | split('/') | compact | slice(0, 2) | last | default('/')"

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 6: Analysis (parallel — all native, zero LLM)
  # ═════════════════════════════════════════════════════════════════════

  # Group pages by URL section (for treemap data)
  - id: pages_by_section
    depends_on: [enriched_pages]
    with: { pages: $enriched_pages }
    invoke:
      tool: "nika:group_by"
      params:
        array: "{{with.pages}}"
        key: "section"

  - id: pages_by_locale
    depends_on: [enriched_pages]
    with: { pages: $enriched_pages }
    invoke:
      tool: "nika:group_by"
      params:
        array: "{{with.pages}}"
        key: "locale"

  - id: stats
    depends_on: [enriched_pages]
    with: { pages: $enriched_pages }
    invoke:
      tool: "nika:aggregate"
      params:
        array: "{{with.pages}}"
        ops: ["count", "avg", "max"]
        field: "elapsed_ms"

  - id: broken_pages
    depends_on: [enriched_pages]
    with: { pages: $enriched_pages }
    invoke:
      tool: "nika:filter"
      params:
        array: "{{with.pages}}"
        field: "status"
        op: "gte"
        value: 400

  - id: soft_404_pages
    depends_on: [enriched_pages]
    with: { pages: $enriched_pages }
    invoke:
      tool: "nika:filter"
      params:
        array: "{{with.pages}}"
        field: "is_soft_404"
        op: "eq"
        value: true

  # Hreflang stats (native — count pages with hreflang, no LLM needed)
  - id: hreflang_pages
    depends_on: [enriched_pages]
    with: { pages: $enriched_pages }
    invoke:
      tool: "nika:filter"
      params:
        array: "{{with.pages}}"
        field: "hreflang_count"
        op: "gt"
        value: 0

  # Hreflang bidirectional validation (LLM — limited sample to avoid context overflow)
  - id: hreflang_audit
    description: "Check hreflang bidirectionality (sample of up to 50 pages)"
    depends_on: [hreflang_pages]
    with:
      pages: $hreflang_pages
    infer:
      prompt: |
        Analyze hreflang bidirectionality. For EACH page in the sample:
        1. Does each target URL exist in the crawl data?
        2. Does the target have a reciprocal hreflang back?
        3. Does the page self-reference?

        Sample pages with hreflang (up to 50):
        {{with.pages | first(50) | pluck('url') | to_json}}

        Total pages with hreflang: {{with.pages | length}}

        Hreflang data for sample:
        {{with.pages | first(50) | to_json}}

        If no pages have hreflang, return total_checked: 0, valid: 0, issues: [].
        Return ONLY the JSON. No prose.
      temperature: 0.0
      max_tokens: 8000
    structured:
      schema:
        type: object
        required: [total_checked, valid, issues]
        properties:
          total_checked: { type: integer }
          valid: { type: integer }
          issues:
            type: array
            items:
              type: object
              required: [url, issue_type]
              properties:
                url: { type: string }
                target_url: { type: string }
                lang: { type: string }
                issue_type:
                  type: string
                  enum: [missing_return, target_not_crawled, no_self_ref]

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 6b: GEO Analysis (parallel with SEO analysis)
  # ═════════════════════════════════════════════════════════════════════

  - id: geo_analysis
    description: "GEO audit — AI crawler access + llms.txt + citability"
    depends_on: [fetch_robots, fetch_llmstxt, enriched_pages]
    with:
      robots: $fetch_robots
      llmstxt: $fetch_llmstxt
      pages: $enriched_pages
    infer:
      prompt: |
        Perform a GEO (Generative Engine Optimization) audit.

        ROBOTS.TXT (status {{with.robots.status | default(0)}}):
        {{with.robots.extracted | default('Not found — no robots.txt')}}

        LLMS.TXT (status {{with.llmstxt.status | default(0)}}):
        {{with.llmstxt.extracted | default('Not found — no llms.txt file')}}

        Sample page titles (20):
        {{with.pages | first(20) | pluck('title') | to_json}}

        Analyze:
        1. AI Crawler Access: Check robots.txt for these user-agents: GPTBot, ChatGPT-User,
           Google-Extended, PerplexityBot, ClaudeBot, Amazonbot, anthropic-ai, Applebot-Extended,
           cohere-ai, Bytespider, CCBot, FacebookBot, Meta-ExternalFetcher, OAI-SearchBot.
           Report: allowed/blocked/not mentioned for each.

        2. llms.txt Status: Does the site have an llms.txt file? What does it contain?

        3. Content Citability: Based on page titles, estimate how well the content would be
           cited by AI search engines. Look for: clear answer structures, factual claims,
           descriptive titles, topic authority signals.

        Return JSON only.
      temperature: 0.0
      max_tokens: 4000
    structured:
      schema:
        type: object
        required: [ai_crawler_access, llmstxt_status, citability_score, findings]
        properties:
          ai_crawler_access:
            type: object
            description: "Map of bot_name → allowed|blocked|not_mentioned"
          llmstxt_status:
            type: string
            enum: [present, not_found, error]
          citability_score:
            type: integer
            description: "0-100 estimate of AI citability"
          findings:
            type: array
            items:
              type: object
              required: [issue, severity, recommendation]
              properties:
                issue: { type: string }
                severity: { type: string, enum: [critical, high, medium, low] }
                recommendation: { type: string }

  # Status distribution chart (PNG)
  - id: status_chart
    description: "Generate status code distribution chart"
    depends_on: [enriched_pages]
    with: { pages: $enriched_pages }
    invoke:
      tool: "nika:chart"
      params:
        type: "bar"
        title: "HTTP Status Distribution"
        width: 800
        height: 400
        series:
          - name: "Pages"
            data:
              - "{{with.pages | where('status', 'gte', 200) | where('status', 'lt', 300) | length}}"
              - "{{with.pages | where('status', 'gte', 300) | where('status', 'lt', 400) | length}}"
              - "{{with.pages | where('status', 'gte', 400) | where('status', 'lt', 500) | length}}"
              - "{{with.pages | where('status', 'gte', 500) | length}}"
        labels:
          - "2xx OK"
          - "3xx Redirect"
          - "4xx Error"
          - "5xx Error"
    artifact:
      path: charts/status-distribution.png
      format: binary

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 7: Build sitemap JSON
  # ═════════════════════════════════════════════════════════════════════

  - id: build_sitemap
    depends_on: [enriched_pages, pages_by_locale, stats, broken_pages,
                 soft_404_pages, hreflang_audit, hreflang_pages]
    with:
      pages: $enriched_pages
      by_locale: $pages_by_locale
      stats: $stats
      broken: $broken_pages
      soft_404: $soft_404_pages
      hreflang: $hreflang_audit
      hreflang_pages: $hreflang_pages
    invoke:
      tool: "nika:json_merge"
      params:
        items:
          - site:
              base_url: "{{inputs.url}}"
              total_pages: "{{with.pages | length}}"
              locales: "{{with.by_locale | keys}}"
              locale_count: "{{with.by_locale | keys | length}}"
              hreflang_page_count: "{{with.hreflang_pages | length}}"
          - pages: "{{with.pages}}"
          - pages_by_locale: "{{with.by_locale}}"
          - hreflang_audit: "{{with.hreflang}}"
          - broken: "{{with.broken}}"
          - soft_404: "{{with.soft_404}}"
          - stats: "{{with.stats}}"
        mode: "deep_merge"
    artifact:
      path: sitemap.json
      format: json

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 8: Visual Artifacts (parallel, LLM-generated)
  # ═════════════════════════════════════════════════════════════════════

  - id: mermaid_tree
    depends_on: [pages_by_locale, enriched_pages]
    with:
      by_locale: $pages_by_locale
      pages: $enriched_pages
    infer:
      prompt: |
        Generate a Mermaid flowchart showing the site structure by locale.
        Show the top 3 depth levels only. Group by locale.

        Base URL: {{inputs.url}}
        Total pages: {{with.pages | length}}
        Locales: {{with.by_locale | keys | to_json}}
        Sample pages (30): {{with.pages | first(30) | pluck('url') | to_json}}

        Format:
        ```mermaid
        graph TD
          root[domain] --> en[EN Np]
          root --> fr[FR Np]
          en --> en_cat1[/en/category 5p]
        ```

        Return ONLY the mermaid code block. Max 50 nodes.
      temperature: 0.0
      max_tokens: 2000
    artifact:
      path: site-structure.md
      format: markdown

  - id: crawl_report
    depends_on: [stats, broken_pages, soft_404_pages, hreflang_audit,
                 pages_by_locale, enriched_pages, hreflang_pages, geo_analysis]
    with:
      stats: $stats
      broken: $broken_pages
      soft_404: $soft_404_pages
      hreflang: $hreflang_audit
      by_locale: $pages_by_locale
      pages: $enriched_pages
      hreflang_pages: $hreflang_pages
      geo: $geo_analysis
    infer:
      prompt: |
        Generate a professional markdown site audit report. Use the SEO auditor skill for scoring.

        SITE: {{inputs.url}}
        TOTAL PAGES: {{with.pages | length}}
        LOCALES ({{with.by_locale | keys | length}}): {{with.by_locale | keys | to_json}}
        HREFLANG PAGES: {{with.hreflang_pages | length}}
        STATS: {{with.stats | to_json}}
        BROKEN ({{with.broken | length}}): {{with.broken | pluck('url') | first(20) | to_json}}
        SOFT 404 ({{with.soft_404 | length}}): {{with.soft_404 | pluck('url') | first(10) | to_json}}
        HREFLANG AUDIT: {{with.hreflang | to_json}}
        GEO AUDIT: {{with.geo | to_json}}
        SAMPLE PAGES (20): {{with.pages | first(20) | to_json}}

        STATUS DISTRIBUTION:
        - 2xx: {{with.pages | where('status', 'gte', 200) | where('status', 'lt', 300) | length}}
        - 3xx: {{with.pages | where('status', 'gte', 300) | where('status', 'lt', 400) | length}}
        - 4xx: {{with.pages | where('status', 'gte', 400) | where('status', 'lt', 500) | length}}
        - 5xx: {{with.pages | where('status', 'gte', 500) | length}}

        DEPTH DISTRIBUTION:
        - Depth 0: {{with.pages | where('depth', 'eq', 0) | length}}
        - Depth 1: {{with.pages | where('depth', 'eq', 1) | length}}
        - Depth 2: {{with.pages | where('depth', 'eq', 2) | length}}
        - Depth 3: {{with.pages | where('depth', 'eq', 3) | length}}
        - Depth 4+: {{with.pages | where('depth', 'gte', 4) | length}}

        Generate these sections:
        1. Executive Summary — health score (use skill formula), top 3 priorities
        2. SEO Score Breakdown — status distribution, issues by severity
        3. Locale & International — locale breakdown table, hreflang coverage
        4. GEO Analysis — AI crawler access, llms.txt status, citability score
        5. Crawl Depth Analysis — depth distribution, flagged deep pages
        6. Performance — response time stats
        7. Issues Index — all issues grouped by severity (CRITICAL/HIGH/MEDIUM/LOW)
        8. Recommendations — prioritized action plan (Quick Wins / This Month / This Quarter)

        Use tables, ASCII bar charts for distributions. Be specific with URLs and numbers.
      temperature: 0.0
      max_tokens: 8000
    artifact:
      path: crawl-report.md
      format: markdown

  # ═════════════════════════════════════════════════════════════════════
  # LAYER 8b: Dashboard data (100% native — zero exec, zero LLM)
  # nika:tree_data + nika:jq replace external jq/awk commands
  # ═════════════════════════════════════════════════════════════════════

  - id: build_tree_children
    description: "Treemap hierarchy — native nested group_by (exact counts)"
    depends_on: [enriched_pages]
    with: { pages: $enriched_pages }
    invoke:
      tool: "nika:tree_data"
      params:
        array: "{{with.pages}}"
        group_by: "locale"
        sub_group_by: "section"
        name_prefix: "/"
        sort: "desc"

  - id: build_tree
    description: "Wrap tree children with domain metadata"
    depends_on: [build_tree_children, enriched_pages, broken_pages, soft_404_pages]
    with:
      children: $build_tree_children
      pages: $enriched_pages
      broken: $broken_pages
      soft_404: $soft_404_pages
    invoke:
      tool: "nika:jq"
      params:
        data:
          name: "{{inputs.url | url_host}}"
          total_pages: "{{with.pages | length}}"
          broken_count: "{{with.broken | length}}"
          soft_404_count: "{{with.soft_404 | length}}"
          children: "{{with.children}}"
        expr: ". + {health_score: ((((.total_pages - .broken_count - .soft_404_count) * 100) / ([.total_pages, 1] | max)) | round)}"

  - id: build_graph
    description: "Force graph — nodes from URL paths, edges from hierarchy"
    depends_on: [enriched_pages]
    with: { pages: $enriched_pages }
    invoke:
      tool: "nika:jq"
      params:
        data: "{{with.pages}}"
        expr: |
          [.[] | .url | strings | split("//") | if length > 1 then (.[1] | split("/") | .[1:] | join("/") | "/" + .) else . end | if . == "" or . == "/" then "/" else rtrimstr("/") end] | unique | .[0:80] | . as $paths | {nodes: [$paths[] | . as $p | {id: $p, g: (if $p == "/" then "root" elif ($p | try test("^/(docs?|api|reference|guides?|learn|tutorials?|examples?|faq|handbook|getting-started|changelog|attributes?|specs?|schemas?)(/|$)") catch false) then "doc" elif ($p | try test("^/(blog|news|articles?|posts?|essays|stories|interviews|updates|press|newsletter|talks?)(/|$)") catch false) then "cnt" elif ($p | try test("^/(about|contact|careers|legal|terms|privacy|team|company|imprint|jobs|lore|webring)(/|$)") catch false) then "co" elif ($p | try test("^/(pricing|features|solutions|enterprise|plans|tarifs|preise)(/|$)") catch false) then "mkt" elif ($p | try test("^/(app|dashboard|console|product|tools|extensions|plugins|integrations|packages?)(/|$)") catch false) then "prod" elif ($p | try test("^/(login|sign-?up|register|auth|account|profile|settings|sso)(/|$)") catch false) then "auth" else "cnt" end)}], links: [$paths[] | select(. != "/") | . as $child | ($child | split("/") | if .[-1] == "" then .[:-1] else . end | .[:-1] | join("/") | if . == "" then "/" else . end) as $parent | select([$paths[] | select(. == $parent)] | length > 0) | [$parent, $child]]}

  - id: slim_pages
    description: "Slim page list for dashboard table (drop heavy sub-objects)"
    depends_on: [enriched_pages]
    with: { pages: $enriched_pages }
    invoke:
      tool: "nika:jq"
      params:
        data: "{{with.pages}}"
        expr: "[.[] | {url, status, title, locale, section, depth, elapsed_ms}]"

  - id: dashboard_stats
    description: "Compute dashboard stats (status distribution, depths, crawlers)"
    depends_on: [enriched_pages, broken_pages, soft_404_pages, fetch_robots]
    with:
      pages: $enriched_pages
      broken: $broken_pages
      soft_404: $soft_404_pages
      robots: $fetch_robots
    invoke:
      tool: "nika:jq"
      params:
        data:
          pages: "{{with.pages}}"
          broken_count: "{{with.broken | length}}"
          soft_404_count: "{{with.soft_404 | length}}"
          robots_txt: "{{with.robots.extracted | default(with.robots) | default('') | to_string}}"
        expr: |
          . as $d |
          ($d.pages | length) as $total |
          [$d.pages[] | .status // 200] | group_by(. / 100 | floor) |
          map({(.[0] / 100 | floor | tostring + "xx"): length}) | add // {} |
          . as $sm |
          {
            health_score: (((($total - $d.broken_count - $d.soft_404_count) * 100) / ([$total, 1] | max)) | round),
            status: {ok: ($sm["2xx"] // 0), redirect: ($sm["3xx"] // 0), error: ($sm["4xx"] // 0), server_error: ($sm["5xx"] // 0)},
            depths: ([$d.pages[] | .depth // 0 | tostring] | group_by(.) | map({(.[0]): length}) | add // {}),
            crawlers: {
              Googlebot: (if ($d.robots_txt | length) > 0 then ($d.robots_txt | test("Googlebot") | not) else true end),
              Bingbot: (if ($d.robots_txt | length) > 0 then ($d.robots_txt | test("Bingbot") | not) else true end),
              GPTBot: (if ($d.robots_txt | length) > 0 then ($d.robots_txt | test("GPTBot") | not) else true end),
              ClaudeBot: (if ($d.robots_txt | length) > 0 then ($d.robots_txt | test("ClaudeBot") | not) else true end)
            }
          }

  - id: write_dashboard_js
    description: "Write all dashboard data as JavaScript variables"
    depends_on: [build_tree, build_graph, crawl_report, slim_pages, dashboard_stats]
    with:
      tree: $build_tree
      graph: $build_graph
      report: $crawl_report
      pages: $slim_pages
      stats: $dashboard_stats
    invoke:
      tool: "nika:write"
      params:
        file_path: "artifacts/tmp/dashboard-data.js"
        content: |
          var TREE = {{with.tree | to_json}};
          var GRAPH = {{with.graph | to_json}};
          var REPORT = {{with.report | to_json}};
          var PAGES = {{with.pages | to_json}};
          var STATS = {{with.stats | to_json}};
          var CHART = "";
        overwrite: true

  - id: html_dashboard
    description: "Inject data variables into dashboard HTML template"
    depends_on: [write_dashboard_js]
    with: { data: $write_dashboard_js }
    invoke:
      tool: "nika:inject"
      params:
        template: "./templates/dashboard.html"
        output: "./artifacts/audit-dashboard.html"
        start_marker: "// DATA —"
        end_marker: "// CONSTANTS & HELPERS"
        content: "{{with.data}}"
