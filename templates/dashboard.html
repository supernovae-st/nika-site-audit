<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Audit Dashboard</title>
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh}
.dash{max-width:1440px;margin:0 auto;padding:20px}
h1{font-size:1.4rem;font-weight:600;margin-bottom:16px;color:#f1f5f9}

/* ===== KPI CARDS ===== */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.card{background:#1e2130;border:1px solid #2d3148;border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;transition:border-color .15s}
.card:hover{border-color:#4f46e5}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--a,#6366f1)}
.card .l{font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:#94a3b8;margin-bottom:3px}
.card .v{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.card .s{font-size:.72rem;color:#64748b;margin-top:2px}

/* ===== TABS ===== */
.tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:8px;border:1px solid #2d3148;background:#1a1d2e;color:#94a3b8;cursor:pointer;font-size:.8rem;transition:all .15s;user-select:none}
.tab.active,.tab:hover{background:#2d3148;color:#f1f5f9;border-color:#4f46e5}

/* ===== VIEW PANELS ===== */
.view{display:none;background:#1a1d2e;border:1px solid #2d3148;border-radius:12px;overflow:hidden;min-height:520px;position:relative;animation:viewIn .25s ease}
.view.active{display:block}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ===== TREEMAP ===== */
.tm-container{width:100%;height:520px;position:relative;overflow:hidden}
.tm-cell{position:absolute;overflow:hidden;cursor:pointer;transition:opacity .15s;display:flex;align-items:flex-end;padding:4px 6px;border:1px solid rgba(15,17,23,.5)}
.tm-cell:hover{opacity:.85;z-index:5}
.tm-cell span{font-size:.6rem;color:rgba(255,255,255,.85);text-shadow:0 1px 2px rgba(0,0,0,.6);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%}
.tm-cell .cv{position:absolute;top:3px;right:5px;font-size:.55rem;opacity:.6;color:#fff}

/* ===== FORCE GRAPH ===== */
.force-wrap{position:relative;width:100%;height:520px}
.force-wrap canvas{display:block;width:100%;height:100%}
.layout-pills{position:absolute;top:12px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10;background:rgba(30,33,48,.85);backdrop-filter:blur(8px);border-radius:8px;padding:4px;border:1px solid #2d3148}
.pill{padding:5px 12px;border-radius:6px;font-size:.72rem;color:#94a3b8;cursor:pointer;transition:all .15s;border:none;background:transparent;font-family:inherit}
.pill.active,.pill:hover{background:#2d3148;color:#f1f5f9}
.pill.active{background:#4f46e5;color:#fff}

/* ===== NODE INFO PANEL ===== */
.info-panel{position:absolute;top:0;right:-320px;width:320px;height:100%;background:#1e2130;border-left:1px solid #2d3148;z-index:20;transition:right .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:20px}
.info-panel.open{right:0}
.info-panel .ip-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:6px;border:1px solid #2d3148;background:#1a1d2e;color:#94a3b8;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .15s}
.info-panel .ip-close:hover{border-color:#4f46e5;color:#f1f5f9}
.ip-path{font-size:1rem;font-weight:600;color:#f1f5f9;margin-bottom:12px;word-break:break-all;padding-right:36px}
.ip-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:600;margin-bottom:16px}
.ip-stat{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #2d3148;font-size:.82rem}
.ip-stat .ip-label{color:#94a3b8}
.ip-stat .ip-val{color:#f1f5f9;font-weight:500}
.ip-section{margin-top:16px;margin-bottom:8px;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:#64748b}
.ip-link{display:block;padding:6px 10px;margin:3px 0;border-radius:6px;background:#1a1d2e;color:#94a3b8;font-size:.78rem;cursor:pointer;transition:all .15s;border:1px solid transparent;text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
.ip-link:hover{border-color:#4f46e5;color:#f1f5f9}

/* ===== TREE LAYOUT ===== */
.tree-container{width:100%;height:520px;overflow:auto;position:relative}
.tree-container svg{display:block}

/* ===== 3D ===== */
.three-container{width:100%;height:520px;position:relative}
#loading3d{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:.9rem}

/* ===== REPORT ===== */
.report-container{padding:32px 40px;max-width:860px;margin:0 auto;line-height:1.7;font-size:.92rem}
.report-container h1{font-size:1.5rem;margin:24px 0 12px;border-bottom:1px solid #2d3148;padding-bottom:8px}
.report-container h2{font-size:1.2rem;margin:20px 0 10px;color:#e2e8f0}
.report-container h3{font-size:1rem;margin:16px 0 8px;color:#e2e8f0}
.report-container p{margin:8px 0;color:#94a3b8}
.report-container strong{color:#f1f5f9}
.report-container ul,.report-container ol{margin:8px 0 8px 24px;color:#94a3b8}
.report-container li{margin:4px 0}
.report-container table{width:100%;border-collapse:collapse;margin:12px 0}
.report-container th{text-align:left;padding:8px 12px;background:#1e2130;color:#e2e8f0;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid #2d3148}
.report-container td{padding:8px 12px;border-bottom:1px solid #2d3148;color:#94a3b8;font-size:.85rem}
.report-container tr:hover td{background:rgba(99,102,241,.05)}
.report-container code{background:#1e2130;padding:2px 6px;border-radius:4px;font-size:.84rem;color:#06b6d4;font-family:'SF Mono',Menlo,monospace}
.report-container hr{border:none;border-top:1px solid #2d3148;margin:20px 0}

/* ===== PAGE LIST ===== */
.pagelist-wrap{display:flex;flex-direction:column;height:520px}
.pl-toolbar{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid #2d3148;align-items:center;flex-wrap:wrap}
.pl-search{background:#1e2130;border:1px solid #2d3148;border-radius:6px;padding:7px 12px;color:#e2e8f0;font-size:.82rem;min-width:200px;outline:none;transition:border-color .15s;font-family:inherit}
.pl-search:focus{border-color:#4f46e5}
.pl-chips{display:flex;gap:4px}
.pl-chip{padding:4px 10px;border-radius:12px;font-size:.7rem;cursor:pointer;border:1px solid #2d3148;background:transparent;color:#94a3b8;transition:all .15s;font-family:inherit}
.pl-chip.active{background:#4f46e5;color:#fff;border-color:#4f46e5}
.pl-chip:hover:not(.active){border-color:#4f46e5;color:#f1f5f9}
.pl-count{margin-left:auto;font-size:.75rem;color:#64748b}
.pl-header{display:grid;grid-template-columns:2fr .6fr 1.5fr .6fr .8fr .5fr;gap:0;border-bottom:1px solid #2d3148;background:#1e2130}
.pl-hcell{padding:8px 12px;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:#64748b;cursor:pointer;user-select:none;display:flex;align-items:center;gap:4px;transition:color .15s}
.pl-hcell:hover{color:#e2e8f0}
.pl-hcell .sort-arrow{font-size:.6rem;opacity:.5}
.pl-hcell.sorted .sort-arrow{opacity:1;color:#6366f1}
.pl-body{flex:1;overflow-y:auto;position:relative}
.pl-body::-webkit-scrollbar{width:6px}
.pl-body::-webkit-scrollbar-track{background:#1a1d2e}
.pl-body::-webkit-scrollbar-thumb{background:#2d3148;border-radius:3px}
.pl-row{display:grid;grid-template-columns:2fr .6fr 1.5fr .6fr .8fr .5fr;gap:0;border-bottom:1px solid rgba(45,49,72,.5);transition:background .1s}
.pl-row:hover{background:rgba(99,102,241,.05)}
.pl-cell{padding:7px 12px;font-size:.8rem;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl-cell.url{color:#e2e8f0;font-family:'SF Mono',Menlo,monospace;font-size:.75rem}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.7rem;font-weight:600}
.status-2xx{background:rgba(16,185,129,.15);color:#10b981}
.status-3xx{background:rgba(245,158,11,.15);color:#f59e0b}
.status-4xx{background:rgba(239,68,68,.15);color:#ef4444}
.status-5xx{background:rgba(139,92,246,.15);color:#8b5cf6}

/* ===== HEALTH ===== */
.health-wrap{padding:32px;display:grid;grid-template-columns:280px 1fr;gap:32px;min-height:520px}
.health-donut{display:flex;flex-direction:column;align-items:center;gap:16px}
.health-donut svg{filter:drop-shadow(0 0 20px rgba(99,102,241,.15))}
.health-score-label{font-size:.82rem;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.health-right{display:flex;flex-direction:column;gap:24px}
.health-section-title{font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin-bottom:10px}
.stacked-bar-container{height:28px;border-radius:6px;overflow:hidden;display:flex;background:#1e2130}
.stacked-bar-seg{height:100%;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:600;color:#fff;transition:width .4s ease}
.depth-bars{display:flex;align-items:flex-end;gap:8px;height:120px;padding-top:12px}
.depth-bar-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.depth-bar{width:100%;border-radius:4px 4px 0 0;transition:height .4s ease;min-width:24px}
.depth-bar-val{font-size:.65rem;color:#94a3b8}
.depth-bar-label{font-size:.68rem;color:#64748b}
.crawler-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.crawler-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1e2130;border-radius:8px;border:1px solid #2d3148}
.crawler-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.crawler-dot.ok{background:#10b981;box-shadow:0 0 6px rgba(16,185,129,.4)}
.crawler-dot.blocked{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.4)}
.crawler-name{font-size:.78rem;color:#e2e8f0}

/* ===== STATUS CHART ===== */
.chart-container{display:flex;align-items:center;justify-content:center;min-height:520px;padding:32px}
.chart-container img{max-width:100%;max-height:460px;border-radius:8px}
.chart-empty{color:#64748b;font-size:.9rem}

/* ===== LEGEND ===== */
.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.legend em{display:flex;align-items:center;gap:5px;font-size:.72rem;color:#94a3b8;font-style:normal}
.legend em::before{content:'';width:9px;height:9px;border-radius:2px;background:var(--c)}
.legend-graph{margin-top:8px}
.legend-graph em::before{border-radius:50%}

/* ===== TOOLTIP ===== */
.tip{display:none;position:fixed;background:#1e2130;border:1px solid #3d4160;border-radius:8px;padding:8px 12px;font-size:.78rem;z-index:100;box-shadow:0 6px 20px rgba(0,0,0,.5);pointer-events:none;max-width:300px}
.tip.show{display:block}
.tip b{color:#f1f5f9;display:block}
.tip i{color:#94a3b8;font-style:normal;font-size:.72rem}

/* ===== LOCALE FILTER BAR ===== */
.filter-bar{display:flex;gap:5px;margin-bottom:14px;align-items:center;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{height:3px}
.filter-bar::-webkit-scrollbar-thumb{background:#2d3148;border-radius:2px}
.filter-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin-right:4px;flex-shrink:0}
.fpill{padding:4px 11px;border-radius:14px;font-size:.7rem;cursor:pointer;border:1px solid #2d3148;background:transparent;color:#94a3b8;transition:all .15s;font-family:inherit;white-space:nowrap;flex-shrink:0}
.fpill.active{background:#4f46e5;color:#fff;border-color:#4f46e5}
.fpill:hover:not(.active){border-color:#4f46e5;color:#f1f5f9}
.fpill .fc{font-size:.58rem;opacity:.55;margin-left:3px}

/* ===== LOCALE GRID VIEW ===== */
.locale-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;padding:20px}
.lcard{background:#1e2130;border:1px solid #2d3148;border-radius:10px;padding:14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.lcard:hover{border-color:#4f46e5;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.3)}
.lcard.sel{border-color:#4f46e5;box-shadow:0 0 12px rgba(99,102,241,.15)}
.lcard-name{font-size:.95rem;font-weight:700;color:#f1f5f9;text-transform:uppercase}
.lcard-ct{font-size:.7rem;color:#64748b;margin-top:2px}
.lcard-score{font-size:1.8rem;font-weight:700;margin:6px 0 2px}
.lcard-label{font-size:.62rem;color:#64748b;text-transform:uppercase;letter-spacing:.04em}
.lcard-bar{height:4px;border-radius:2px;background:#2d3148;margin-top:10px;overflow:hidden}
.lcard-fill{height:100%;border-radius:2px;transition:width .4s ease}

/* ===== OVERVIEW ===== */
.overview-wrap{padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
.ov-section{background:#1e2130;border:1px solid #2d3148;border-radius:10px;padding:20px}
.ov-section-full{grid-column:1/-1}
.ov-title{font-size:.82rem;text-transform:uppercase;letter-spacing:.06em;color:#64748b;margin-bottom:14px}
.ov-issues{display:flex;flex-direction:column;gap:6px}
.ov-issue{display:flex;align-items:center;gap:10px;padding:8px 12px;background:#1a1d2e;border-radius:8px;border:1px solid #2d3148}
.ov-sev{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.ov-sev.critical{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.4)}
.ov-sev.high{background:#f59e0b;box-shadow:0 0 6px rgba(245,158,11,.4)}
.ov-sev.medium{background:#06b6d4}
.ov-sev.low{background:#64748b}
.ov-issue-text{font-size:.8rem;color:#e2e8f0;flex:1}
.ov-issue-count{font-size:.75rem;color:#94a3b8;font-weight:600}
.ov-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px}
.ov-stat{text-align:center;padding:10px}
.ov-stat-val{font-size:1.3rem;font-weight:700;color:#f1f5f9}
.ov-stat-label{font-size:.65rem;color:#64748b;text-transform:uppercase;margin-top:2px}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .health-wrap{grid-template-columns:1fr}
  .pl-toolbar{flex-direction:column;align-items:stretch}
  .pl-count{margin-left:0;margin-top:4px}
  .overview-wrap{grid-template-columns:1fr}
  .filter-bar{flex-wrap:nowrap}
}
</style>
</head>
<body>
<div class="dash">
  <h1 id="title">Site Structure</h1>
  <div class="cards" id="cards"></div>
  <div class="filter-bar" id="filterbar"></div>
  <div class="tabs" id="tabbar"></div>

  <!-- Tab views -->
  <div class="view" id="v-overview"><div class="overview-wrap" id="overview-ct"></div></div>
  <div class="view" id="v-treemap"><div class="tm-container" id="tm"></div></div>
  <div class="view" id="v-force">
    <div class="force-wrap" id="force-wrap">
      <div class="layout-pills" id="layout-pills"></div>
      <canvas id="cv"></canvas>
      <div class="info-panel" id="info-panel"></div>
    </div>
  </div>
  <div class="view" id="v-tree"><div class="tree-container" id="tree-ct"></div></div>
  <div class="view" id="v-3d"><div class="three-container" id="three-ct"><div id="loading3d">Loading 3D view...</div></div></div>
  <div class="view" id="v-report"><div class="report-container" id="report-ct"></div></div>
  <div class="view" id="v-pages"><div class="pagelist-wrap" id="pages-ct"></div></div>
  <div class="view" id="v-locale"><div class="locale-grid" id="locale-ct"></div></div>
  <div class="view" id="v-health"><div class="health-wrap" id="health-ct"></div></div>
  <div class="view" id="v-chart"><div class="chart-container" id="chart-ct"></div></div>

  <div class="legend" id="legend"></div>
  <div class="legend legend-graph" id="legend-graph" style="display:none"></div>
</div>
<div class="tip" id="tip"><b></b><i></i></div>

    {name:"de",children:[{name:"/",value:30},{name:"/preise",value:12},{name:"/blog",value:95},{name:"/docs",value:140},{name:"/api",value:60},{name:"/kontakt",value:4}]},
    {name:"ja",children:[{name:"/",value:25},{name:"/blog",value:45},{name:"/docs",value:88},{name:"/api",value:40}]},

var REPORT = "# Site Audit Report\n\n## Summary\n\nCrawled **1586 pages** across **6 locales**.\n\n## Key Findings\n\n- 98% health score\n- 12 broken links found\n- 3 redirect chains detected\n- All critical pages indexed\n\n## Status Distribution\n\n| Status | Count | Percentage |\n|--------|-------|------------|\n| 2xx | 1540 | 97.1% |\n| 3xx | 28 | 1.8% |\n| 4xx | 12 | 0.8% |\n| 5xx | 6 | 0.4% |\n\n## Recommendations\n\n- Fix 12 broken links (4xx errors)\n- Resolve 3 redirect chains to single hops\n- Add hreflang tags for 15 pages missing locale alternates";

  {url:"/broken-link",status:404,title:"Not Found",locale:"en",section:"other",depth:2,elapsed_ms:30},
  {url:"/server-error",status:500,title:"Error",locale:"en",section:"other",depth:3,elapsed_ms:5000},
  {url:"/fr",status:200,title:"Accueil",locale:"fr",section:"root",depth:0,elapsed_ms:115},
  {url:"/fr/blog",status:200,title:"Blog FR",locale:"fr",section:"blog",depth:1,elapsed_ms:98}

var STATS = {
  health_score:98,
  status:{ok:1540,redirect:28,error:12,server_error:6},
  depths:{"0":6,"1":180,"2":820,"3":450,"4":100,"5":30},
  crawlers:{Googlebot:true,Bingbot:true,GPTBot:false,ClaudeBot:true,"Anthropic-AI":true,CCBot:false,ChatGPT:false,PerplexityBot:true}
};

var CHART = "";

// ======================================================================
// CONSTANTS & HELPERS
// ======================================================================
var P = ['#6366f1','#06b6d4','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6'];
var GC = {root:'#f59e0b',mkt:'#6366f1',cnt:'#10b981',doc:'#06b6d4',co:'#8b5cf6',prod:'#ec4899',auth:'#ef4444'};
var GL = {root:'Root',mkt:'Marketing',cnt:'Content',doc:'Docs',co:'Company',prod:'Product',auth:'Auth'};

// ======================================================================
// STATE SYSTEM — reactive locale filter + computed data
// ======================================================================
var STATE = { locale: 'all' };

function clearEl(el) { while (el.firstChild) el.removeChild(el.firstChild); }

// Build locale index at load time for O(1) filtering
// Filter out non-locale path segments (cdn-cgi, qr-code, etc.)
var FAKE_LOCALES = {'cdn-cgi':1,'qr-code':1,'qr-kod':1,'qr-kode':1,'qr-koodi':1};
var LOCALE_INDEX = {};
var LOCALE_COUNTS = {};
PAGES.forEach(function(p, i) {
  var loc = p.locale || 'default';
  if (!LOCALE_INDEX[loc]) LOCALE_INDEX[loc] = [];
  LOCALE_INDEX[loc].push(i);
  LOCALE_COUNTS[loc] = (LOCALE_COUNTS[loc] || 0) + 1;
});
var ALL_LOCALES = Object.keys(LOCALE_COUNTS).filter(function(l) { return !FAKE_LOCALES[l]; }).sort();

function getFilteredPages() {
  if (STATE.locale === 'all') return PAGES;
  var idx = LOCALE_INDEX[STATE.locale] || [];
  return idx.map(function(i) { return PAGES[i]; });
}

function getFilteredTree() {
  if (STATE.locale === 'all') return TREE;
  var child = null;
  TREE.children.forEach(function(c) { if (c.name === STATE.locale) child = c; });
  if (!child) return TREE;
  var total = child.children.reduce(function(s, c) { return s + c.value; }, 0);
  return {
    name: TREE.name, total_pages: total,
    health_score: TREE.health_score, broken_count: TREE.broken_count || 0,
    soft_404_count: TREE.soft_404_count || 0,
    children: [child]
  };
}

function computeFilteredStats() {
  var pages = getFilteredPages();
  var total = pages.length;
  var ok = 0, redir = 0, err = 0, se = 0;
  var depths = {};
  pages.forEach(function(p) {
    var s = p.status || 200;
    if (s >= 200 && s < 300) ok++;
    else if (s >= 300 && s < 400) redir++;
    else if (s >= 400 && s < 500) err++;
    else if (s >= 500) se++;
    var d = String(p.depth || 0);
    depths[d] = (depths[d] || 0) + 1;
  });
  var hs = total > 0 ? Math.round(((total - err - se) * 100) / total) : 100;
  return {
    health_score: hs,
    status: { ok: ok, redirect: redir, error: err, server_error: se },
    depths: depths,
    crawlers: STATS.crawlers
  };
}

// ======================================================================
// TREEMAP (squarified algorithm — re-renderable for locale filter)
// ======================================================================
function renderTreemap() {
  var container = document.getElementById('tm');
  clearEl(container);
  var treeData = getFilteredTree();
  var W = container.clientWidth || 1200;
  var H = container.clientHeight || 520;
  var flat = [], total = 0;
  var singleLocale = treeData.children.length === 1;
  var sectionIdx = 0;

  treeData.children.forEach(function(loc, i) {
    loc.children.forEach(function(pg) {
      var rawName = pg.name;
      var displayName = rawName.startsWith('/') ? rawName : '/' + rawName;
      var color = singleLocale ? P[sectionIdx % P.length] : P[i % P.length];
      var tipPath;
      if (singleLocale || loc.name === 'default') { tipPath = displayName; }
      else { tipPath = '/' + loc.name + displayName; }
      flat.push({name:displayName, value:pg.value, locale:loc.name, color:color, tipPath:tipPath});
      total += pg.value;
      sectionIdx++;
    });
  });

  flat.sort(function(a, b) { return b.value - a.value; });
  var maxVal = flat.length ? flat[0].value : 1;

  function squarify(items, x, y, w, h) {
    if (!items.length) return;
    if (items.length === 1) { lay(items[0], x, y, w, h); return; }
    var tot = items.reduce(function(s, i) { return s + i.value; }, 0);
    var horiz = w >= h, mainDim = horiz ? h : w;
    var row = [items[0]], rowSum = items[0].value;
    var best = worst(row, rowSum, mainDim, tot);
    for (var i = 1; i < items.length; i++) {
      var nRow = row.concat(items[i]), nSum = rowSum + items[i].value;
      var nW = worst(nRow, nSum, mainDim, tot);
      if (nW <= best) { row = nRow; rowSum = nSum; best = nW; } else break;
    }
    var rf = rowSum / tot, rs = horiz ? w * rf : h * rf, off = 0;
    row.forEach(function(item) {
      var f = item.value / rowSum, cs = mainDim * f;
      if (horiz) lay(item, x, y + off, rs, cs); else lay(item, x + off, y, cs, rs);
      off += cs;
    });
    var rest = items.slice(row.length);
    if (horiz) squarify(rest, x + rs, y, w - rs, h);
    else squarify(rest, x, y + rs, w, h - rs);
  }

  function worst(row, rs, side) {
    var r2 = rs * rs, mx = 0, mn = Infinity;
    row.forEach(function(i) { if (i.value > mx) mx = i.value; if (i.value < mn) mn = i.value; });
    return Math.max(side * side * mx / r2, r2 / (side * side * mn));
  }

  function lay(item, x, y, w, h) {
    var cell = mk('div', 'tm-cell', container);
    cell.style.left = x + 'px';
    cell.style.top = y + 'px';
    cell.style.width = Math.max(0, w - 1) + 'px';
    cell.style.height = Math.max(0, h - 1) + 'px';
    var ratio = Math.log(1 + item.value) / Math.log(1 + maxVal);
    var brightness = 30 + Math.round(ratio * 45);
    cell.style.background = 'color-mix(in srgb,' + item.color + ' ' + brightness + '%,#1e2130)';
    if (w > 35 && h > 20) { var sp = mk('span', null, cell); sp.textContent = item.name; }
    if (w > 50 && h > 28) { var cv = mk('span', 'cv', cell); cv.textContent = item.value; }
    cell.addEventListener('mouseenter', function(e) {
      showTip(e.clientX, e.clientY, item.tipPath, item.value + ' pages (' + Math.round(item.value / total * 100) + '%)');
    });
    cell.addEventListener('mousemove', function(e) {
      showTip(e.clientX, e.clientY, item.tipPath, item.value + ' pages (' + Math.round(item.value / total * 100) + '%)');
    });
    cell.addEventListener('mouseleave', hideTip);
  }

  if (flat.length) squarify(flat, 0, 0, W, H);

  // Update legend
  var elg = document.getElementById('legend');
  clearEl(elg);
  if (singleLocale) {
    var idx = 0;
    treeData.children[0].children.forEach(function(sec) {
      var em = mk('em', null, elg);
      em.style.setProperty('--c', P[idx % P.length]);
      var name = sec.name.startsWith('/') ? sec.name : '/' + sec.name;
      em.appendChild(document.createTextNode(name + ' (' + sec.value + ')'));
      idx++;
    });
  } else {
    treeData.children.forEach(function(loc, i) {
      var em = mk('em', null, elg);
      em.style.setProperty('--c', P[i % P.length]);
      var count = loc.children.reduce(function(s, p) { return s + p.value; }, 0);
      em.appendChild(document.createTextNode(loc.name + ' (' + count + ')'));
    });
  }
}

// ======================================================================
// FORCE GRAPH 2D — 5 layout modes with smooth transitions
// ======================================================================
(function initForceGraph() {
  var cv = document.getElementById('cv');
  var ctx = cv.getContext('2d');
  var wrap = document.getElementById('force-wrap');
  var W, H, dpr;
  var layoutMode = 'force';
  var LAYOUT_MODES = ['Force', 'Radial', 'Hierarchy', 'Circular', 'Cluster'];

  // Resize handler
  function resize() {
    dpr = window.devicePixelRatio || 1;
    var rect = wrap.getBoundingClientRect();
    W = rect.width; H = 520;
    cv.width = W * dpr; cv.height = H * dpr;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  var needsScatter = true;
  window._forceResize = function() {
    resize();
    if (needsScatter && W > 0) {
      needsScatter = false;
      nodes.forEach(function(n) {
        n.x = W / 2 + (Math.random() - .5) * 300;
        n.y = H / 2 + (Math.random() - .5) * 200;
      });
    }
  };

  // Build pill toolbar
  var pillBar = document.getElementById('layout-pills');
  LAYOUT_MODES.forEach(function(mode) {
    var p = mk('button', 'pill' + (mode.toLowerCase() === layoutMode ? ' active' : ''), pillBar);
    p.textContent = mode;
    p.addEventListener('click', function() {
      var key = mode.toLowerCase();
      if (key === layoutMode) return;
      layoutMode = key;
      pillBar.querySelectorAll('.pill').forEach(function(pp) { pp.classList.remove('active'); });
      p.classList.add('active');
      computeTargetPositions();
      startTransition();
    });
  });

  // Node and link data
  var nodes = GRAPH.nodes.map(function(n) {
    return {id:n.id, g:n.g, x:W / 2 + (Math.random() - .5) * 300, y:H / 2 + (Math.random() - .5) * 200,
      vx:0, vy:0, lc:0, tx:0, ty:0, drag:false};
  });
  var nm = {}; nodes.forEach(function(n) { nm[n.id] = n; });
  var links = GRAPH.links.map(function(l) { return {s:nm[l[0]], t:nm[l[1]]}; }).filter(function(l) { return l.s && l.t; });
  links.forEach(function(l) { l.s.lc++; l.t.lc++; });

  // Inbound counts for orphan detection
  var inboundCount = {};
  nodes.forEach(function(n) { inboundCount[n.id] = 0; });
  links.forEach(function(l) { inboundCount[l.t.id] = (inboundCount[l.t.id] || 0) + 1; });

  // Page status lookup for broken-link edges
  var pageStatusMap = {};
  PAGES.forEach(function(p) { pageStatusMap[p.url] = p.status; });

  // Adjacency for BFS
  var adj = {};
  nodes.forEach(function(n) { adj[n.id] = []; });
  links.forEach(function(l) {
    adj[l.s.id].push(l.t.id);
    adj[l.t.id].push(l.s.id);
  });

  function bfsDepths() {
    var depths = {};
    var root = nodes.find(function(n) { return n.g === 'root'; }) || nodes[0];
    var queue = [root.id];
    depths[root.id] = 0;
    while (queue.length) {
      var cur = queue.shift();
      (adj[cur] || []).forEach(function(nb) {
        if (depths[nb] === undefined) { depths[nb] = depths[cur] + 1; queue.push(nb); }
      });
    }
    nodes.forEach(function(n) { if (depths[n.id] === undefined) depths[n.id] = 999; });
    return depths;
  }

  // Physics
  var N = nodes.length;
  var SL = N > 50 ? 90 : 70, SK = N > 50 ? .008 : .01, REP = N > 50 ? 4000 : 2500, DMP = .88, CK = .003;

  // Camera state
  var camX = 0, camY = 0, camS = 1;
  var dragN = null, panOn = false, ps = {x:0, y:0};
  var hoverN = null, selectedN = null;

  // Transition state
  var transitioning = false, transFrame = 0, TRANS_FRAMES = 60;
  var snapshots = [];

  function tw(sx, sy) { return [(sx - W / 2) / camS - camX, (sy - H / 2) / camS - camY]; }

  // ---- Layout target computations ----
  function computeTargetPositions() {
    var cx = W / 2, cy = H / 2;
    if (layoutMode === 'force') {
      nodes.forEach(function(n) { n.tx = n.x; n.ty = n.y; });
      return;
    }
    var depths = bfsDepths();

    if (layoutMode === 'radial') {
      var maxD = 0;
      nodes.forEach(function(n) { if (depths[n.id] < 999 && depths[n.id] > maxD) maxD = depths[n.id]; });
      var ringGap = Math.min(W, H) * 0.4 / Math.max(maxD, 1);
      var byDepth = {};
      nodes.forEach(function(n) {
        var d = depths[n.id] >= 999 ? maxD + 1 : depths[n.id];
        if (!byDepth[d]) byDepth[d] = [];
        byDepth[d].push(n);
      });
      Object.keys(byDepth).forEach(function(d) {
        var ring = byDepth[d];
        var r = parseInt(d) * ringGap;
        ring.forEach(function(n, i) {
          var a = (i / ring.length) * Math.PI * 2 - Math.PI / 2;
          n.tx = cx + Math.cos(a) * r;
          n.ty = cy + Math.sin(a) * r;
        });
      });
    }
    else if (layoutMode === 'hierarchy') {
      var maxD = 0;
      nodes.forEach(function(n) { if (depths[n.id] < 999 && depths[n.id] > maxD) maxD = depths[n.id]; });
      var layerH = H / (maxD + 2);
      var byDepth = {};
      nodes.forEach(function(n) {
        var d = depths[n.id] >= 999 ? maxD + 1 : depths[n.id];
        if (!byDepth[d]) byDepth[d] = [];
        byDepth[d].push(n);
      });
      Object.keys(byDepth).forEach(function(d) {
        var layer = byDepth[d];
        var layerW = W / (layer.length + 1);
        layer.forEach(function(n, i) {
          n.tx = layerW * (i + 1);
          n.ty = (parseInt(d) + 1) * layerH;
        });
      });
    }
    else if (layoutMode === 'circular') {
      var groups = {};
      nodes.forEach(function(n) {
        if (!groups[n.g]) groups[n.g] = [];
        groups[n.g].push(n);
      });
      var gKeys = Object.keys(groups);
      var bigR = Math.min(W, H) * 0.35;
      gKeys.forEach(function(gk, gi) {
        var ga = (gi / gKeys.length) * Math.PI * 2 - Math.PI / 2;
        var gcx = cx + Math.cos(ga) * bigR;
        var gcy = cy + Math.sin(ga) * bigR;
        var members = groups[gk];
        var smallR = Math.min(40, bigR * 0.25);
        members.forEach(function(n, mi) {
          var ma = (mi / members.length) * Math.PI * 2;
          n.tx = gcx + Math.cos(ma) * smallR;
          n.ty = gcy + Math.sin(ma) * smallR;
        });
      });
    }
    else if (layoutMode === 'cluster') {
      var groups = {};
      nodes.forEach(function(n) {
        if (!groups[n.g]) groups[n.g] = [];
        groups[n.g].push(n);
      });
      var gKeys = Object.keys(groups);
      var cols = Math.ceil(Math.sqrt(gKeys.length));
      var cellW = W / cols;
      var cellH = H / Math.ceil(gKeys.length / cols);
      gKeys.forEach(function(gk, gi) {
        var col = gi % cols, row = Math.floor(gi / cols);
        var gcx = cellW * (col + 0.5);
        var gcy = cellH * (row + 0.5);
        var members = groups[gk];
        members.forEach(function(n, mi) {
          var a = (mi / members.length) * Math.PI * 2;
          var r = Math.min(cellW, cellH) * 0.3;
          var scale = members.length > 1 ? (0.4 + 0.6 * mi / (members.length - 1)) : 0;
          n.tx = gcx + Math.cos(a) * r * scale;
          n.ty = gcy + Math.sin(a) * r * scale;
        });
      });
    }
  }

  function startTransition() {
    snapshots = nodes.map(function(n) { return {node:n, sx:n.x, sy:n.y}; });
    transFrame = 0;
    transitioning = true;
  }

  // ---- Physics sim (force mode only) ----
  function sim() {
    if (layoutMode !== 'force') return;
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i + 1; j < nodes.length; j++) {
        var a = nodes[i], b = nodes[j];
        var dx = b.x - a.x, dy = b.y - a.y;
        var d = Math.sqrt(dx * dx + dy * dy) || 1;
        var f = REP / (d * d);
        var fx = dx / d * f, fy = dy / d * f;
        a.vx -= fx; a.vy -= fy;
        b.vx += fx; b.vy += fy;
      }
    }
    links.forEach(function(l) {
      var dx = l.t.x - l.s.x, dy = l.t.y - l.s.y;
      var d = Math.sqrt(dx * dx + dy * dy) || 1;
      var f = (d - SL) * SK;
      l.s.vx += dx / d * f; l.s.vy += dy / d * f;
      l.t.vx -= dx / d * f; l.t.vy -= dy / d * f;
    });
    nodes.forEach(function(n) {
      if (n.drag) return;
      n.vx += (W / 2 - n.x) * CK;
      n.vy += (H / 2 - n.y) * CK;
      n.vx *= DMP; n.vy *= DMP;
      n.x += n.vx; n.y += n.vy;
    });
  }

  // ---- Transition step ----
  function stepTransition() {
    if (!transitioning) return;
    transFrame++;
    var t = easeOutCubic(Math.min(transFrame / TRANS_FRAMES, 1));
    snapshots.forEach(function(s) {
      s.node.x = s.sx + (s.node.tx - s.sx) * t;
      s.node.y = s.sy + (s.node.ty - s.sy) * t;
    });
    if (transFrame >= TRANS_FRAMES) transitioning = false;
  }

  // Pulsing animation time
  var pulseT = 0;

  // ---- Draw ----
  function draw() {
    pulseT += 0.04;
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.translate(W / 2, H / 2);
    ctx.scale(camS, camS);
    ctx.translate(camX, camY);

    var activeRef = selectedN || hoverN;

    // Edges
    links.forEach(function(l) {
      var connected = activeRef && (l.s === activeRef || l.t === activeRef);
      var tgtStatus = pageStatusMap[l.t.id] || 200;
      var isBroken = tgtStatus >= 400;

      if (isBroken) {
        var pulse = 0.4 + 0.4 * Math.sin(pulseT * 3);
        ctx.lineWidth = 2.5 / camS;
        ctx.strokeStyle = 'rgba(239,68,68,' + pulse.toFixed(2) + ')';
        ctx.setLineDash([6 / camS, 4 / camS]);
      } else if (connected) {
        ctx.lineWidth = 2.5 / camS;
        ctx.strokeStyle = 'rgba(99,102,241,.7)';
        ctx.setLineDash([]);
      } else {
        ctx.lineWidth = 1 / camS;
        ctx.strokeStyle = 'rgba(100,116,139,.15)';
        ctx.setLineDash([]);
      }

      ctx.beginPath();
      ctx.moveTo(l.s.x, l.s.y);
      ctx.lineTo(l.t.x, l.t.y);
      ctx.stroke();
      ctx.setLineDash([]);

      // Arrows on connected edges
      if (connected) {
        var dx = l.t.x - l.s.x, dy = l.t.y - l.s.y, d = Math.sqrt(dx * dx + dy * dy) || 1;
        var r = Math.max(4, Math.sqrt(l.t.lc) * 3.5);
        var ax = l.t.x - dx / d * (r + 4), ay = l.t.y - dy / d * (r + 4);
        var sz = 6 / camS, ang = Math.atan2(dy, dx);
        ctx.fillStyle = 'rgba(99,102,241,.7)';
        ctx.beginPath();
        ctx.moveTo(ax + Math.cos(ang) * sz, ay + Math.sin(ang) * sz);
        ctx.lineTo(ax + Math.cos(ang + 2.5) * sz * .6, ay + Math.sin(ang + 2.5) * sz * .6);
        ctx.lineTo(ax + Math.cos(ang - 2.5) * sz * .6, ay + Math.sin(ang - 2.5) * sz * .6);
        ctx.fill();
      }
    });

    // Nodes
    nodes.forEach(function(n) {
      var r = Math.max(4, Math.sqrt(n.lc) * 3.5);
      var c = GC[n.g] || '#6366f1';
      var isHover = n === hoverN;
      var isSelected = n === selectedN;
      var isConn = activeRef && links.some(function(l) {
        return (l.s === activeRef && l.t === n) || (l.t === activeRef && l.s === n);
      });
      var dimmed = activeRef && !isHover && !isSelected && !isConn;
      var isOrphan = inboundCount[n.id] === 0 && n.g !== 'root';

      ctx.globalAlpha = dimmed ? .2 : 1;
      ctx.shadowColor = c;
      ctx.shadowBlur = (isHover || isSelected) ? 20 : 8;
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.arc(n.x, n.y, (isHover || isSelected) ? r * 1.3 : r, 0, 6.28);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Orphan dashed border
      if (isOrphan && !dimmed) {
        ctx.strokeStyle = 'rgba(239,68,68,.5)';
        ctx.lineWidth = 1.5 / camS;
        ctx.setLineDash([3 / camS, 3 / camS]);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Selected white ring
      if (isSelected) {
        ctx.strokeStyle = '#f1f5f9';
        ctx.lineWidth = 2.5 / camS;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r * 1.3 + 3 / camS, 0, 6.28);
        ctx.stroke();
      }
      // Hover ring
      if (isHover && !isSelected) {
        ctx.strokeStyle = '#f1f5f9';
        ctx.lineWidth = 2 / camS;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r * 1.3, 0, 6.28);
        ctx.stroke();
      }

      // Label
      if (camS > .4 || n.g === 'root' || isHover || isSelected || isConn) {
        ctx.fillStyle = dimmed ? 'rgba(226,232,240,.2)' : '#e2e8f0';
        ctx.font = 'bold ' + ((isHover || isSelected) ? 12 : 10) / camS + 'px system-ui';
        ctx.textAlign = 'center';
        ctx.fillText(n.id, n.x, n.y - r - 5 / camS);
      }
      ctx.globalAlpha = 1;
    });

    ctx.restore();
  }

  function tick() {
    sim();
    stepTransition();
    draw();
    requestAnimationFrame(tick);
  }

  // ---- Info Panel ----
  var infoPanel = document.getElementById('info-panel');

  function openInfoPanel(node) {
    selectedN = node;
    infoPanel.textContent = '';
    infoPanel.classList.add('open');

    var closeBtn = mk('button', 'ip-close', infoPanel);
    closeBtn.textContent = '\u2715';
    closeBtn.addEventListener('click', closeInfoPanel);

    var pathEl = mk('div', 'ip-path', infoPanel);
    pathEl.textContent = node.id;

    var badge = mk('span', 'ip-badge', infoPanel);
    badge.textContent = GL[node.g] || node.g;
    badge.style.background = (GC[node.g] || '#6366f1') + '22';
    badge.style.color = GC[node.g] || '#6366f1';

    var connCount = links.filter(function(l) { return l.s === node || l.t === node; }).length;
    var inbound = links.filter(function(l) { return l.t === node; }).length;
    var outbound = links.filter(function(l) { return l.s === node; }).length;
    var status = pageStatusMap[node.id] || '-';

    [{l:'Connections',v:connCount},{l:'Inbound',v:inbound},{l:'Outbound',v:outbound},{l:'Status',v:status}].forEach(function(s) {
      var row = mk('div', 'ip-stat', infoPanel);
      var lab = mk('span', 'ip-label', row); lab.textContent = s.l;
      var val = mk('span', 'ip-val', row); val.textContent = s.v;
    });

    var connNodes = [];
    links.forEach(function(l) {
      if (l.s === node) connNodes.push({dir:'out', n:l.t});
      if (l.t === node) connNodes.push({dir:'in', n:l.s});
    });

    if (connNodes.length) {
      var sec = mk('div', 'ip-section', infoPanel);
      sec.textContent = 'Connected Nodes';
      connNodes.forEach(function(cn) {
        var link = mk('div', 'ip-link', infoPanel);
        link.textContent = (cn.dir === 'in' ? '\u2190 ' : '\u2192 ') + cn.n.id;
        link.addEventListener('click', function() { openInfoPanel(cn.n); });
      });
    }
  }

  function closeInfoPanel() {
    selectedN = null;
    infoPanel.classList.remove('open');
  }

  // ---- Mouse interaction ----
  cv.addEventListener('mousedown', function(e) {
    var rect = cv.getBoundingClientRect();
    var p = tw(e.clientX - rect.left, e.clientY - rect.top);
    var best = null, bd = 18 / camS;
    nodes.forEach(function(n) {
      var dx = n.x - p[0], dy = n.y - p[1];
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d < bd) { bd = d; best = n; }
    });
    if (best) { dragN = best; dragN.drag = true; }
    else { panOn = true; ps = {x:e.clientX, y:e.clientY}; }
  });

  cv.addEventListener('mousemove', function(e) {
    var rect = cv.getBoundingClientRect();
    if (dragN) {
      var p = tw(e.clientX - rect.left, e.clientY - rect.top);
      dragN.x = p[0]; dragN.y = p[1]; dragN.vx = 0; dragN.vy = 0;
    } else if (panOn) {
      camX += (e.clientX - ps.x) / camS;
      camY += (e.clientY - ps.y) / camS;
      ps = {x:e.clientX, y:e.clientY};
    } else {
      var p = tw(e.clientX - rect.left, e.clientY - rect.top);
      var best = null, bd = 18 / camS;
      nodes.forEach(function(n) {
        var dx = n.x - p[0], dy = n.y - p[1];
        var d = Math.sqrt(dx * dx + dy * dy);
        if (d < bd) { bd = d; best = n; }
      });
      hoverN = best;
      if (best) {
        cv.style.cursor = 'pointer';
        showTip(e.clientX, e.clientY, best.id, best.lc + ' connections \u00B7 ' + (GL[best.g] || best.g));
      } else {
        cv.style.cursor = 'default';
        hideTip();
      }
    }
  });

  cv.addEventListener('mouseup', function() {
    if (dragN) dragN.drag = false;
    dragN = null;
    panOn = false;
  });

  cv.addEventListener('click', function(e) {
    var rect = cv.getBoundingClientRect();
    var p = tw(e.clientX - rect.left, e.clientY - rect.top);
    var best = null, bd = 18 / camS;
    nodes.forEach(function(n) {
      var dx = n.x - p[0], dy = n.y - p[1];
      var d = Math.sqrt(dx * dx + dy * dy);
      if (d < bd) { bd = d; best = n; }
    });
    if (best) openInfoPanel(best);
    else closeInfoPanel();
  });

  cv.addEventListener('mouseleave', function() {
    if (dragN) dragN.drag = false;
    dragN = null; panOn = false; hoverN = null; hideTip();
  });

  cv.addEventListener('wheel', function(e) {
    e.preventDefault();
    camS = Math.max(.15, Math.min(6, camS * (e.deltaY > 0 ? .92 : 1.08)));
  }, {passive:false});

  // Escape key closes panel
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeInfoPanel();
  });

  tick();
})();

// ======================================================================
// TREE LAYOUT (SVG hierarchy)
// ======================================================================
(function initTreeLayout() {
  var container = document.getElementById('tree-ct');

  function buildHierarchy() {
    var root = {id:'/', label:'/', children:[], g:'root', depth:0};
    var map = {'/':root};
    var sorted = GRAPH.nodes.slice().sort(function(a, b) {
      return a.id.split('/').length - b.id.split('/').length;
    });
    sorted.forEach(function(n) {
      if (n.id === '/') return;
      var parts = n.id.split('/').filter(Boolean);
      var parentPath = '/' + parts.slice(0, -1).join('/');
      if (parentPath !== '/') parentPath = '/' + parts.slice(0, -1).join('/');
      if (!map[parentPath]) parentPath = '/';
      var node = {id:n.id, label:parts[parts.length - 1] || n.id, children:[], g:n.g, depth:parts.length};
      map[n.id] = node;
      map[parentPath].children.push(node);
    });
    return root;
  }

  var tree = buildHierarchy();
  var NW = 160, NH = 36, PX = 200, PY = 52;

  var yCounter = 0;
  function layoutTree(node, depth) {
    node.x = depth * PX + 40;
    if (!node.children.length) {
      node.y = yCounter * PY + 30;
      yCounter++;
    } else {
      node.children.forEach(function(c) { layoutTree(c, depth + 1); });
      var first = node.children[0].y, last = node.children[node.children.length - 1].y;
      node.y = (first + last) / 2;
    }
  }
  layoutTree(tree, 0);

  function maxDepth(n) { return n.children.length ? 1 + Math.max.apply(null, n.children.map(maxDepth)) : 0; }
  var totalW = (maxDepth(tree) + 1) * PX + NW + 80;
  var totalH = yCounter * PY + 40;

  var svg = svgEl('svg', {width:totalW, height:totalH, viewBox:'0 0 ' + totalW + ' ' + totalH});

  // Edges
  function drawEdges(node) {
    node.children.forEach(function(c) {
      var sx = node.x + NW, sy = node.y + NH / 2, ex = c.x, ey = c.y + NH / 2;
      var mx = (sx + ex) / 2;
      var path = svgEl('path', {
        d:'M' + sx + ',' + sy + ' C' + mx + ',' + sy + ' ' + mx + ',' + ey + ' ' + ex + ',' + ey,
        fill:'none', stroke:'rgba(100,116,139,.3)', 'stroke-width':'1.5'
      });
      svg.appendChild(path);
      drawEdges(c);
    });
  }
  drawEdges(tree);

  // Nodes
  function drawNodes(node) {
    var g = svgEl('g', {transform:'translate(' + node.x + ',' + node.y + ')'});
    var rect = svgEl('rect', {width:NW, height:NH, rx:6, ry:6, fill:'#1e2130', stroke:GC[node.g] || '#6366f1', 'stroke-width':'1.5'});
    g.appendChild(rect);
    var accent = svgEl('rect', {width:NW, height:3, rx:6, ry:6, fill:GC[node.g] || '#6366f1', opacity:'.6'});
    g.appendChild(accent);
    var text = svgEl('text', {x:10, y:NH / 2 + 4, fill:'#e2e8f0', 'font-size':11, 'font-family':'system-ui,sans-serif'});
    text.textContent = node.label.length > 18 ? node.label.slice(0, 16) + '..' : node.label;
    g.appendChild(text);
    if (node.children.length) {
      var badge = svgEl('text', {x:NW - 8, y:NH / 2 + 4, fill:'#64748b', 'font-size':9, 'text-anchor':'end', 'font-family':'system-ui'});
      badge.textContent = node.children.length;
      g.appendChild(badge);
    }
    g.style.cursor = 'pointer';
    g.addEventListener('mouseenter', function(e) {
      rect.setAttribute('stroke-width', '2.5');
      showTip(e.clientX, e.clientY, node.id, node.children.length + ' children \u00B7 ' + (GL[node.g] || node.g));
    });
    g.addEventListener('mousemove', function(e) {
      showTip(e.clientX, e.clientY, node.id, node.children.length + ' children \u00B7 ' + (GL[node.g] || node.g));
    });
    g.addEventListener('mouseleave', function() { rect.setAttribute('stroke-width', '1.5'); hideTip(); });
    svg.appendChild(g);
    node.children.forEach(drawNodes);
  }
  drawNodes(tree);
  container.appendChild(svg);
})();

    '  W=ct.clientWidth;H=ct.clientHeight||520;',
    '  camera.aspect=W/H;camera.updateProjectionMatrix();',
    '  renderer.setSize(W,H);labelRenderer.setSize(W,H);',
    '});'
  ].join('\n');
  document.body.appendChild(mod);
}

// ======================================================================
// REPORT (safe markdown to HTML — createElement-based, ZERO innerHTML)
// ======================================================================
function renderReport() {
  var ct = document.getElementById('report-ct');
  var lines = REPORT.split('\n');
  var i = 0;

  function isTableRow(line) { return line.indexOf('|') !== -1 && line.trim().charAt(0) === '|'; }
  function isTableSep(line) { return /^\|[\s\-|]+\|$/.test(line.trim()); }
  function parseTableCells(line) {
    return line.split('|').slice(1, -1).map(function(c) { return c.trim(); });
  }

  while (i < lines.length) {
    var line = lines[i];

    // Empty line
    if (!line.trim()) { i++; continue; }

    // Headings
    var headMatch = line.match(/^(#{1,3})\s+(.+)/);
    if (headMatch) {
      var level = headMatch[1].length;
      var hEl = mk('h' + level, null, ct);
      appendInline(hEl, headMatch[2]);
      i++; continue;
    }

    // Horizontal rule
    if (/^---+$/.test(line.trim())) {
      ct.appendChild(document.createElement('hr'));
      i++; continue;
    }

    // Table block
    if (isTableRow(line)) {
      var headerCells = parseTableCells(line);
      i++;
      if (i < lines.length && isTableSep(lines[i])) i++;
      var table = document.createElement('table');
      var thead = document.createElement('thead');
      var headRow = document.createElement('tr');
      headerCells.forEach(function(c) {
        var th = document.createElement('th');
        th.textContent = c;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);
      var tbody = document.createElement('tbody');
      while (i < lines.length && isTableRow(lines[i])) {
        var cells = parseTableCells(lines[i]);
        var tr = document.createElement('tr');
        cells.forEach(function(c) {
          var td = document.createElement('td');
          td.textContent = c;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
        i++;
      }
      table.appendChild(tbody);
      ct.appendChild(table);
      continue;
    }

    // Unordered list
    if (/^- /.test(line)) {
      var ul = document.createElement('ul');
      while (i < lines.length && /^- /.test(lines[i])) {
        var li = document.createElement('li');
        appendInline(li, lines[i].slice(2));
        ul.appendChild(li);
        i++;
      }
      ct.appendChild(ul);
      continue;
    }

    // Ordered list
    if (/^\d+\.\s/.test(line)) {
      var ol = document.createElement('ol');
      while (i < lines.length && /^\d+\.\s/.test(lines[i])) {
        var li = document.createElement('li');
        appendInline(li, lines[i].replace(/^\d+\.\s/, ''));
        ol.appendChild(li);
        i++;
      }
      ct.appendChild(ol);
      continue;
    }

    // Paragraph
    var p = document.createElement('p');
    appendInline(p, line);
    ct.appendChild(p);
    i++;
  }

  // Inline formatting: **bold**, `code` — using createElement only (safe)
  function appendInline(parent, text) {
    var regex = /(\*\*(.+?)\*\*|`(.+?)`)/g;
    var lastIdx = 0;
    var match;
    while ((match = regex.exec(text)) !== null) {
      if (match.index > lastIdx) {
        parent.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
      }
      if (match[2]) {
        var strong = document.createElement('strong');
        strong.textContent = match[2];
        parent.appendChild(strong);
      } else if (match[3]) {
        var code = document.createElement('code');
        code.textContent = match[3];
        parent.appendChild(code);
      }
      lastIdx = regex.lastIndex;
    }
    if (lastIdx < text.length) {
      parent.appendChild(document.createTextNode(text.slice(lastIdx)));
    }
  }
}

// ======================================================================
// PAGE LIST (searchable, sortable, filterable, virtual scroll)
// ======================================================================
function renderPageList() {
  var ct = document.getElementById('pages-ct');
  var allPages = PAGES.slice();
  var filteredPages = allPages.slice();
  var sortCol = 'url', sortAsc = true;
  var filterStatus = 'all';
  var searchTerm = '';
  var VISIBLE_ROWS = 50;
  var ROW_HEIGHT = 34;

  // Toolbar
  var toolbar = mk('div', 'pl-toolbar', ct);
  var searchInput = mk('input', 'pl-search', toolbar);
  searchInput.type = 'text';
  searchInput.placeholder = 'Search pages...';

  var chips = mk('div', 'pl-chips', toolbar);
  var chipDefs = [
    {key:'all',label:'All'},{key:'2xx',label:'2xx'},
    {key:'3xx',label:'3xx'},{key:'4xx',label:'4xx'},{key:'5xx',label:'5xx'}
  ];
  chipDefs.forEach(function(cd) {
    var chip = mk('button', 'pl-chip' + (cd.key === 'all' ? ' active' : ''), chips);
    chip.textContent = cd.label;
    chip.dataset.filter = cd.key;
    chip.addEventListener('click', function() {
      filterStatus = cd.key;
      chips.querySelectorAll('.pl-chip').forEach(function(c) { c.classList.remove('active'); });
      chip.classList.add('active');
      applyFilters();
    });
  });

  var countEl = mk('span', 'pl-count', toolbar);

  // Column header
  var cols = [
    {key:'url', label:'URL'},
    {key:'status', label:'Status'},
    {key:'title', label:'Title'},
    {key:'locale', label:'Locale'},
    {key:'section', label:'Section'},
    {key:'depth', label:'Depth'}
  ];
  var header = mk('div', 'pl-header', ct);
  cols.forEach(function(c) {
    var hcell = mk('div', 'pl-hcell' + (c.key === sortCol ? ' sorted' : ''), header);
    hcell.textContent = c.label;
    var arrow = mk('span', 'sort-arrow', hcell);
    arrow.textContent = c.key === sortCol ? (sortAsc ? '\u25B2' : '\u25BC') : '\u25B2';
    hcell.addEventListener('click', function() {
      if (sortCol === c.key) sortAsc = !sortAsc;
      else { sortCol = c.key; sortAsc = true; }
      header.querySelectorAll('.pl-hcell').forEach(function(h) { h.classList.remove('sorted'); });
      hcell.classList.add('sorted');
      arrow.textContent = sortAsc ? '\u25B2' : '\u25BC';
      applyFilters();
    });
  });

  // Body with virtual scrolling
  var body = mk('div', 'pl-body', ct);
  var spacerTop = mk('div', null, body);
  var rowContainer = mk('div', null, body);
  var spacerBottom = mk('div', null, body);

  function statusClass(s) {
    if (s >= 500) return 'status-5xx';
    if (s >= 400) return 'status-4xx';
    if (s >= 300) return 'status-3xx';
    return 'status-2xx';
  }

  function truncate(s, n) { return s.length > n ? s.slice(0, n - 1) + '\u2026' : s; }

  function renderRows() {
    var scrollTop = body.scrollTop;
    var startIdx = Math.max(0, Math.floor(scrollTop / ROW_HEIGHT) - 5);
    var endIdx = Math.min(filteredPages.length, startIdx + VISIBLE_ROWS + 10);

    spacerTop.style.height = (startIdx * ROW_HEIGHT) + 'px';
    spacerBottom.style.height = Math.max(0, (filteredPages.length - endIdx) * ROW_HEIGHT) + 'px';

    rowContainer.textContent = '';
    for (var i = startIdx; i < endIdx; i++) {
      var pg = filteredPages[i];
      var row = mk('div', 'pl-row', rowContainer);
      row.style.height = ROW_HEIGHT + 'px';

      var urlCell = mk('div', 'pl-cell url', row);
      urlCell.textContent = truncate(pg.url, 60);
      urlCell.title = pg.url;

      var statusCell = mk('div', 'pl-cell', row);
      var badge = mk('span', 'status-badge ' + statusClass(pg.status), statusCell);
      badge.textContent = pg.status;

      var titleCell = mk('div', 'pl-cell', row);
      titleCell.textContent = pg.title;

      var localeCell = mk('div', 'pl-cell', row);
      localeCell.textContent = pg.locale;

      var sectionCell = mk('div', 'pl-cell', row);
      sectionCell.textContent = pg.section;

      var depthCell = mk('div', 'pl-cell', row);
      depthCell.textContent = pg.depth;
    }
  }

  function applyFilters() {
    filteredPages = allPages.filter(function(pg) {
      if (filterStatus !== 'all') {
        var prefix = parseInt(filterStatus);
        var lo = prefix * 100, hi = lo + 99;
        if (pg.status < lo || pg.status > hi) return false;
      }
      if (searchTerm) {
        var q = searchTerm.toLowerCase();
        if (pg.url.toLowerCase().indexOf(q) === -1 &&
            pg.title.toLowerCase().indexOf(q) === -1 &&
            pg.section.toLowerCase().indexOf(q) === -1 &&
            pg.locale.toLowerCase().indexOf(q) === -1) return false;
      }
      return true;
    });

    filteredPages.sort(function(a, b) {
      var av = a[sortCol], bv = b[sortCol];
      if (typeof av === 'string') av = av.toLowerCase();
      if (typeof bv === 'string') bv = bv.toLowerCase();
      if (av < bv) return sortAsc ? -1 : 1;
      if (av > bv) return sortAsc ? 1 : -1;
      return 0;
    });

    countEl.textContent = 'Showing ' + filteredPages.length + ' of ' + allPages.length + ' pages';
    renderRows();
  }

  var searchTimer = null;
  searchInput.addEventListener('input', function() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(function() {
      searchTerm = searchInput.value;
      applyFilters();
    }, 200);
  });

  body.addEventListener('scroll', renderRows);
  applyFilters();
}

// ======================================================================
// HEALTH (donut ring, status bars, depth chart, crawler grid)
// ======================================================================
function renderHealth() {
  var ct = document.getElementById('health-ct');
  clearEl(ct);
  var stats = STATE.locale === 'all' ? STATS : computeFilteredStats();
  var score = stats.health_score;

  // Left: donut
  var donutWrap = mk('div', 'health-donut', ct);
  var SIZE = 200, CX = 100, CY = 100, R = 80, SW = 14;
  var donutSvg = svgEl('svg', {width:SIZE, height:SIZE, viewBox:'0 0 ' + SIZE + ' ' + SIZE});
  donutWrap.appendChild(donutSvg);

  var bgCircle = svgEl('circle', {cx:CX, cy:CY, r:R, fill:'none', stroke:'#2d3148', 'stroke-width':SW});
  donutSvg.appendChild(bgCircle);

  var circumference = 2 * Math.PI * R;
  var scoreColor = score >= 90 ? '#10b981' : score >= 70 ? '#f59e0b' : '#ef4444';
  var dashLen = circumference * score / 100;
  var scoreCircle = svgEl('circle', {
    cx:CX, cy:CY, r:R, fill:'none', stroke:scoreColor, 'stroke-width':SW,
    'stroke-dasharray':dashLen + ' ' + (circumference - dashLen),
    'stroke-dashoffset':String(circumference * 0.25),
    'stroke-linecap':'round',
    transform:'rotate(-90 ' + CX + ' ' + CY + ')'
  });
  donutSvg.appendChild(scoreCircle);

  var scoreText = svgEl('text', {x:CX, y:CY + 4, 'text-anchor':'middle', fill:'#f1f5f9', 'font-size':36, 'font-weight':'bold', 'font-family':'system-ui'});
  scoreText.textContent = score;
  donutSvg.appendChild(scoreText);
  var pctText = svgEl('text', {x:CX, y:CY + 22, 'text-anchor':'middle', fill:'#64748b', 'font-size':14, 'font-family':'system-ui'});
  pctText.textContent = '%';
  donutSvg.appendChild(pctText);

  var donutLabel = mk('div', 'health-score-label', donutWrap);
  donutLabel.textContent = 'Health Score';

  // Right column
  var rightCol = mk('div', 'health-right', ct);

  // Status distribution stacked bar
  var statusSection = mk('div', null, rightCol);
  var statusTitle = mk('div', 'health-section-title', statusSection);
  statusTitle.textContent = 'Status Distribution';

  var st = stats.status;
  var total = st.ok + st.redirect + st.error + st.server_error;
  var segments = [
    {label:'2xx', count:st.ok, color:'#10b981'},
    {label:'3xx', count:st.redirect, color:'#f59e0b'},
    {label:'4xx', count:st.error, color:'#ef4444'},
    {label:'5xx', count:st.server_error, color:'#8b5cf6'}
  ];

  var barContainer = mk('div', 'stacked-bar-container', statusSection);
  segments.forEach(function(seg) {
    if (seg.count === 0) return;
    var pct = seg.count / total * 100;
    var segEl = mk('div', 'stacked-bar-seg', barContainer);
    segEl.style.width = pct + '%';
    segEl.style.background = seg.color;
    if (pct > 5) segEl.textContent = seg.label + ' ' + Math.round(pct) + '%';
  });

  var statusLegend = mk('div', null, statusSection);
  statusLegend.style.cssText = 'display:flex;gap:16px;margin-top:8px;flex-wrap:wrap';
  segments.forEach(function(seg) {
    var item = mk('div', null, statusLegend);
    item.style.cssText = 'display:flex;align-items:center;gap:6px;font-size:.78rem;color:#94a3b8';
    var dot = mk('span', null, item);
    dot.style.cssText = 'width:8px;height:8px;border-radius:2px;flex-shrink:0;background:' + seg.color;
    item.appendChild(document.createTextNode(seg.label + ': ' + seg.count.toLocaleString()));
  });

  // Depth distribution bars
  var depthSection = mk('div', null, rightCol);
  var depthTitle = mk('div', 'health-section-title', depthSection);
  depthTitle.textContent = 'Depth Distribution';

  var depthEntries = Object.keys(stats.depths).sort();
  var maxDepthVal = 0;
  depthEntries.forEach(function(k) { if (stats.depths[k] > maxDepthVal) maxDepthVal = stats.depths[k]; });

  var depthBars = mk('div', 'depth-bars', depthSection);
  depthEntries.forEach(function(k, idx) {
    var val = stats.depths[k];
    var col = mk('div', 'depth-bar-col', depthBars);
    var valLabel = mk('div', 'depth-bar-val', col);
    valLabel.textContent = val;
    var bar = mk('div', 'depth-bar', col);
    var h = Math.max(4, (val / maxDepthVal) * 100);
    bar.style.height = h + 'px';
    bar.style.background = P[idx % P.length];
    var label = mk('div', 'depth-bar-label', col);
    label.textContent = parseInt(k) >= 5 ? k + '+' : k;
  });

  // AI Crawler grid
  var crawlerSection = mk('div', null, rightCol);
  var crawlerTitle = mk('div', 'health-section-title', crawlerSection);
  crawlerTitle.textContent = 'AI Crawler Access';

  var crawlerGrid = mk('div', 'crawler-grid', crawlerSection);
  Object.keys(stats.crawlers).forEach(function(name) {
    var allowed = stats.crawlers[name];
    var item = mk('div', 'crawler-item', crawlerGrid);
    mk('div', 'crawler-dot ' + (allowed ? 'ok' : 'blocked'), item);
    var nameEl = mk('span', 'crawler-name', item);
    nameEl.textContent = name;
  });
}

// ======================================================================
// OVERVIEW — landing view with key metrics + top issues
// ======================================================================
function renderOverview() {
  var ct = document.getElementById('overview-ct');
  clearEl(ct);
  var stats = STATE.locale === 'all' ? STATS : computeFilteredStats();
  var pages = getFilteredPages();

  // Status overview section
  var statusSec = mk('div', 'ov-section', ct);
  var statusTitle = mk('div', 'ov-title', statusSec);
  statusTitle.textContent = 'Status Overview';
  var statusGrid = mk('div', 'ov-stat-grid', statusSec);
  var statusItems = [
    {v: stats.status.ok, l: '2xx OK', c: '#10b981'},
    {v: stats.status.redirect, l: '3xx Redirect', c: '#f59e0b'},
    {v: stats.status.error, l: '4xx Error', c: '#ef4444'},
    {v: stats.status.server_error, l: '5xx Server', c: '#8b5cf6'}
  ];
  statusItems.forEach(function(item) {
    var cell = mk('div', 'ov-stat', statusGrid);
    var val = mk('div', 'ov-stat-val', cell);
    val.textContent = item.v.toLocaleString();
    val.style.color = item.c;
    var lab = mk('div', 'ov-stat-label', cell);
    lab.textContent = item.l;
  });

  // Locale summary section
  var localeSec = mk('div', 'ov-section', ct);
  var localeTitle = mk('div', 'ov-title', localeSec);
  localeTitle.textContent = 'Locales (' + ALL_LOCALES.length + ')';
  var localeGrid = mk('div', 'ov-stat-grid', localeSec);
  // Show top 8 locales by page count
  var locSorted = ALL_LOCALES.slice().sort(function(a, b) { return (LOCALE_COUNTS[b] || 0) - (LOCALE_COUNTS[a] || 0); });
  locSorted.slice(0, 8).forEach(function(loc) {
    var cell = mk('div', 'ov-stat', localeGrid);
    cell.style.cursor = 'pointer';
    var val = mk('div', 'ov-stat-val', cell);
    val.textContent = LOCALE_COUNTS[loc];
    var lab = mk('div', 'ov-stat-label', cell);
    lab.textContent = loc.toUpperCase();
    cell.addEventListener('click', function() {
      STATE.locale = loc;
      document.querySelectorAll('.fpill').forEach(function(p) {
        p.classList.toggle('active', p.dataset.locale === loc);
      });
      onLocaleChange();
    });
  });
  if (ALL_LOCALES.length > 8) {
    var moreCell = mk('div', 'ov-stat', localeGrid);
    var moreVal = mk('div', 'ov-stat-val', moreCell);
    moreVal.textContent = '+' + (ALL_LOCALES.length - 8);
    moreVal.style.color = '#64748b';
    var moreLab = mk('div', 'ov-stat-label', moreCell);
    moreLab.textContent = 'More';
  }

  // Issues section
  var issuesSec = mk('div', 'ov-section ov-section-full', ct);
  var issuesTitle = mk('div', 'ov-title', issuesSec);
  issuesTitle.textContent = 'Top Issues';
  var issuesList = mk('div', 'ov-issues', issuesSec);

  // Compute issues from data
  var issues = [];
  var errPages = pages.filter(function(p) { return p.status >= 400 && p.status < 500; });
  var sePages = pages.filter(function(p) { return p.status >= 500; });
  var deepPages = pages.filter(function(p) { return (p.depth || 0) >= 4; });
  var noTitle = pages.filter(function(p) { return !p.title || p.title === ''; });
  var soft404 = pages.filter(function(p) {
    return p.title && p.title.toLowerCase().indexOf('not found') !== -1 && p.status >= 200 && p.status < 300;
  });

  if (sePages.length > 0) issues.push({sev:'critical', text:'Server errors (5xx)', count:sePages.length});
  if (errPages.length > 0) issues.push({sev:'high', text:'Client errors (4xx)', count:errPages.length});
  if (soft404.length > 0) issues.push({sev:'high', text:'Soft 404 pages', count:soft404.length});
  if (noTitle.length > 0) issues.push({sev:'medium', text:'Pages without title', count:noTitle.length});
  if (deepPages.length > 0) issues.push({sev:'medium', text:'Deep pages (depth 4+)', count:deepPages.length});
  if (issues.length === 0) {
    var allGood = mk('div', 'ov-issue', issuesList);
    var goodDot = mk('div', 'ov-sev low', allGood);
    var goodText = mk('div', 'ov-issue-text', allGood);
    goodText.textContent = 'No critical issues detected';
  }
  issues.forEach(function(iss) {
    var row = mk('div', 'ov-issue', issuesList);
    mk('div', 'ov-sev ' + iss.sev, row);
    var text = mk('div', 'ov-issue-text', row);
    text.textContent = iss.text;
    var count = mk('div', 'ov-issue-count', row);
    count.textContent = iss.count;
  });

  // Depth distribution mini-section
  var depthSec = mk('div', 'ov-section ov-section-full', ct);
  var depthTitle = mk('div', 'ov-title', depthSec);
  depthTitle.textContent = 'Crawl Depth';
  var depthGrid = mk('div', 'ov-stat-grid', depthSec);
  var depthKeys = Object.keys(stats.depths).sort();
  depthKeys.forEach(function(k) {
    var cell = mk('div', 'ov-stat', depthGrid);
    var val = mk('div', 'ov-stat-val', cell);
    val.textContent = stats.depths[k];
    var lab = mk('div', 'ov-stat-label', cell);
    lab.textContent = 'Depth ' + k;
  });
}

// ======================================================================
// LOCALE GRID — small-multiples health per locale
// ======================================================================
function renderLocaleGrid() {
  var ct = document.getElementById('locale-ct');
  clearEl(ct);

  ALL_LOCALES.forEach(function(loc, i) {
    var pages = LOCALE_INDEX[loc] || [];
    var total = pages.length;
    var errCount = 0;
    pages.forEach(function(idx) {
      if (PAGES[idx].status >= 400) errCount++;
    });
    var hs = total > 0 ? Math.round(((total - errCount) * 100) / total) : 100;
    var scoreColor = hs >= 90 ? '#10b981' : hs >= 70 ? '#f59e0b' : '#ef4444';

    var card = mk('div', 'lcard' + (STATE.locale === loc ? ' sel' : ''), ct);
    card.style.borderTop = '3px solid ' + P[i % P.length];

    var name = mk('div', 'lcard-name', card);
    name.textContent = loc.toUpperCase();

    var count = mk('div', 'lcard-ct', card);
    count.textContent = total + ' pages';

    var scoreEl = mk('div', 'lcard-score', card);
    scoreEl.textContent = hs + '%';
    scoreEl.style.color = scoreColor;

    var label = mk('div', 'lcard-label', card);
    label.textContent = errCount > 0 ? errCount + ' errors' : 'No errors';

    var barWrap = mk('div', 'lcard-bar', card);
    var fill = mk('div', 'lcard-fill', barWrap);
    fill.style.width = hs + '%';
    fill.style.background = scoreColor;

    card.addEventListener('click', function() {
      STATE.locale = STATE.locale === loc ? 'all' : loc;
      document.querySelectorAll('.fpill').forEach(function(p) {
        p.classList.toggle('active', p.dataset.locale === STATE.locale);
      });
      onLocaleChange();
      renderLocaleGrid();
    });
  });
}

// ======================================================================
// STATUS CHART (embedded base64 PNG image)
// ======================================================================
function renderChart() {
  var ct = document.getElementById('chart-ct');
  if (CHART && CHART.length > 0) {
    var img = document.createElement('img');
    img.src = 'data:image/png;base64,' + CHART;
    img.alt = 'Status chart';
    ct.appendChild(img);
  } else {
    var msg = mk('div', 'chart-empty', ct);
    msg.textContent = 'No chart data available. Set the CHART variable to a base64-encoded PNG.';
  }
}
